{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📊 Constituency Intelligence</h2>

<style>

/* ===== CONTROLS ===== */
.controls {
    padding: 10px;
    background: #f0f5f0;
    display: flex;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* ===== BADGES ===== */
.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 6px;
    background: #e0e0e0;
    margin-right: 5px;
    font-size: 12px;
}

/* ===== TABLE ===== */
.table-container {
    overflow-x: auto;
}

.intel-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    table-layout: fixed;
}

.intel-table th,
.intel-table td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* header */
.intel-table th {
    background: #0B5D1E;
    color: white;
    text-align: left;
}

/* sortable */
.sortable {
    cursor: pointer;
}
.sortable:hover {
    background: #145214;
}

/* numeric columns centered */
.num {
    text-align: center;
}

/* province grouping */
.province-row {
    background: #0B5D1E;
    color: white;
    font-weight: bold;
}

/* heatmap */
.heat-win { background: rgba(0,200,0,0.15); }
.heat-toss { background: rgba(255,200,0,0.2); }
.heat-lose { background: rgba(255,0,0,0.15); }

/* status text */
.WIN { color: green; font-weight: bold; }
.LOSE { color: red; font-weight: bold; }
.TOSS-UP { color: orange; font-weight: bold; }

</style>

<!-- FILTERS -->
<div class="controls">
    <input type="text" id="search" placeholder="Search constituency...">
    <input type="text" id="provinceFilter" placeholder="Filter province...">
</div>

<!-- ACTIVE FILTER BADGES -->
<div id="activeFilters" style="margin-bottom:10px;"></div>

<!-- TABLE -->
<div class="table-container">
<table class="intel-table">

    <colgroup>
        <col style="width:20%">
        <col style="width:15%">
        <col style="width:12%">
        <col style="width:12%">
        <col style="width:13%">
        <col style="width:12%">
        <col style="width:16%">
    </colgroup>

    <thead>
        <tr>
            <th class="sortable" onclick="sortTable('constituency')">Constituency</th>
            <th class="sortable" onclick="sortTable('province')">Province</th>
            <th class="sortable num" onclick="sortTable('members')">Members</th>
            <th class="sortable num" onclick="sortTable('voters')">Voters</th>
            <th class="sortable num" onclick="sortTable('penetration')">Penetration %</th>
            <th class="sortable num" onclick="sortTable('margin')">Margin</th>
            <th class="sortable" onclick="sortTable('status')">Status</th>
        </tr>
    </thead>

    <tbody id="table-body"></tbody>

</table>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

let allData = []
let sortKey = null
let sortAsc = true

async function loadData() {
    try {
        let res = await fetch("/api/constituency_intelligence")
        allData = await res.json()
        render()
    } catch (e) {
        console.error("LOAD ERROR:", e)
    }
}

/* SORTING */
window.sortTable = function(key) {
    if (sortKey === key) {
        sortAsc = !sortAsc
    } else {
        sortKey = key
        sortAsc = true
    }
    render()
}

/* MAIN RENDER */
function render() {

    let tbody = document.getElementById("table-body")
    let badgeBox = document.getElementById("activeFilters")

    let search = (document.getElementById("search").value || "").toLowerCase()
    let provinceFilter = (document.getElementById("provinceFilter").value || "").toLowerCase()

    /* BADGES */
    badgeBox.innerHTML = ""
    if (search) badgeBox.innerHTML += `<span class="badge">Search: ${search}</span>`
    if (provinceFilter) badgeBox.innerHTML += `<span class="badge">Province: ${provinceFilter}</span>`

    /* FILTER */
    let data = allData.filter(c => {
        let con = (c.constituency || "").toLowerCase()
        let prov = (c.province || "").toLowerCase()

        return (
            (!search || con.includes(search) || prov.includes(search)) &&
            (!provinceFilter || prov.includes(provinceFilter))
        )
    })

    /* SORT */
    if (sortKey) {
        data.sort((a,b) => {
            let x = a[sortKey] || 0
            let y = b[sortKey] || 0
            return sortAsc ? x - y : y - x
        })
    }

    /* GROUP BY PROVINCE */
    let grouped = {}

    data.forEach(c => {
        if (!grouped[c.province]) grouped[c.province] = []
        grouped[c.province].push(c)
    })

    let html = ""

    Object.keys(grouped).forEach(province => {

        html += `
        <tr class="province-row">
            <td colspan="7">${province}</td>
        </tr>
        `

        grouped[province].forEach(c => {

            let heat = ""
            if (c.status === "WIN") heat = "heat-win"
            else if (c.status === "LOSE") heat = "heat-lose"
            else heat = "heat-toss"

            html += `
            <tr class="${heat}">
                <td>${c.constituency}</td>
                <td>${c.province}</td>
                <td class="num">${c.members}</td>
                <td class="num">${c.voters}</td>
                <td class="num">${c.penetration}%</td>
                <td class="num">${c.margin}</td>
                <td class="${c.status}">${c.status}</td>
            </tr>
            `
        })
    })

    tbody.innerHTML = html
}

/* listeners */
setTimeout(() => {
    document.getElementById("search").addEventListener("input", render)
    document.getElementById("provinceFilter").addEventListener("input", render)
}, 100)

/* refresh */
setInterval(loadData, 5000)

/* init */
loadData()

})

</script>

{% endblock %}
