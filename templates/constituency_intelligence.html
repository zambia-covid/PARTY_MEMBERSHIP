{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📊 Constituency Intelligence (DEBUG MODE)</h2>

<style>
.controls {
    padding: 10px;
    background: #f0f5f0;
    display: flex;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

th {
    background: #0B5D1E;
    color: white;
}

.kpi {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
}
</style>

<!-- FILTERS -->
<div class="controls">
    <input type="text" id="search" placeholder="Search constituency...">
    <input type="text" id="provinceFilter" placeholder="Filter province...">
</div>

<!-- KPI -->
<div id="kpis"></div>

<!-- TABLE -->
<table>
    <thead>
        <tr>
            <th>Constituency</th>
            <th>Province</th>
            <th>Members</th>
            <th>Voters</th>
            <th>Penetration</th>
            <th>Margin</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", function(){

console.log("🔥 SCRIPT LOADED")

let allData = []

async function loadData() {
    try {
        console.log("🚀 FETCHING DATA...")

        let res = await fetch("/api/constituency_intelligence")
        let data = await res.json()

        console.log("✅ DATA RECEIVED:", data)

        allData = data
        render()

    } catch (e) {
        console.error("❌ LOAD ERROR:", e)
    }
}

function render() {

    console.log("🧠 RENDER STARTED")

    let tbody = document.getElementById("table-body")
    let kpis = document.getElementById("kpis")

    console.log("TBODY:", tbody)
    console.log("KPIS:", kpis)
    console.log("DATA LENGTH:", allData.length)

    if (!tbody || !kpis) {
        console.error("❌ DOM ELEMENTS MISSING")
        return
    }

    let html = ""

    allData.forEach((c, index) => {

        console.log("ROW", index, c)

        try {

            let constituency = c.constituency || "N/A"
            let province = c.province || "N/A"

            html += `
                <tr>
                    <td>${constituency}</td>
                    <td>${province}</td>
                    <td>${c.members}</td>
                    <td>${c.voters}</td>
                    <td>${c.penetration}</td>
                    <td>${c.margin}</td>
                    <td>${c.status}</td>
                </tr>
            `

        } catch (err) {
            console.error("❌ ROW ERROR:", err, c)
        }

    })

    tbody.innerHTML = html

    kpis.innerHTML = `
        <div class="kpi">Loaded Rows: ${allData.length}</div>
    `

    console.log("✅ RENDER COMPLETE")
}

/* safe event binding */
setTimeout(() => {
    let s = document.getElementById("search")
    let p = document.getElementById("provinceFilter")

    if (s) {
        console.log("✔ search input found")
        s.addEventListener("input", render)
    }

    if (p) {
        console.log("✔ province input found")
        p.addEventListener("input", render)
    }

}, 100)

/* start */
loadData()

})
</script>

{% endblock %}
