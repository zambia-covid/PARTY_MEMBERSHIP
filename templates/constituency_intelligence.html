{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📊 Constituency Intelligence</h2>

<!-- ===== CHART LIBRARY ===== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== LAYOUT ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

/* KPI cards */
.kpi {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.kpi h3 {
    margin: 5px 0;
}

/* controls */
.controls {
    padding: 10px;
    background: #f0f5f0;
    display: flex;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

th {
    background: #0B5D1E;
    color: white;
}

tr:hover {
    background: #f3f7f3;
    cursor: pointer;
}

/* status colors */
.WIN { color: green; font-weight: bold; }
.LOSE { color: red; font-weight: bold; }
.TOSS-UP { color: orange; font-weight: bold; }

.danger {
    background: rgba(255,0,0,0.1);
}

.chart-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

</style>

<!-- ===== KPI SUMMARY ===== -->
<div class="grid" id="kpis"></div>

<!-- ===== CHART ===== -->
<div class="chart-box">
    <canvas id="statusChart"></canvas>
</div>

<!-- ===== FILTERS ===== -->
<div class="controls">
    <input type="text" id="search" placeholder="Search constituency...">
    <input type="text" id="provinceFilter" placeholder="Filter province...">
</div>

<!-- ===== TABLE ===== -->
<table>
    <thead>
        <tr>
            <th>Constituency</th>
            <th>Province</th>
            <th>Members</th>
            <th>Voters</th>
            <th>Penetration %</th>
            <th>Margin</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>

let allData = []
let chart

async function loadData() {
    let res = await fetch("/api/constituency_intelligence")
    let data = await res.json()
    allData = data
    render()
}

function render() {

    let tbody = document.getElementById("table-body")
    let kpis = document.getElementById("kpis")

    let search = document.getElementById("search").value.toLowerCase()
    let provinceFilter = document.getElementById("provinceFilter").value.toLowerCase()

    let win = 0, lose = 0, toss = 0
    let totalMembers = 0
    let html = ""

    allData.forEach(c => {

        if (
            !c.constituency.toLowerCase().includes(search) &&
            !c.province.toLowerCase().includes(search)
        ) return

        if (provinceFilter && !c.province.toLowerCase().includes(provinceFilter)) return

        totalMembers += c.members

        if (c.status === "WIN") win++
        else if (c.status === "LOSE") lose++
        else toss++

        let danger = (c.status === "LOSE" && c.margin < -500) ? "danger" : ""

        html += `
            <tr class="${danger}" onclick="drill('${c.constituency}')">
                <td>${c.constituency}</td>
                <td>${c.province}</td>
                <td>${c.members}</td>
                <td>${c.voters}</td>
                <td>${c.penetration}%</td>
                <td>${c.margin}</td>
                <td class="${c.status}">${c.status}</td>
            </tr>
        `
    })

    tbody.innerHTML = html

    // ===== KPI CARDS =====
    kpis.innerHTML = `
        <div class="kpi"><h4>WIN</h4><h2>${win}</h2></div>
        <div class="kpi"><h4>TOSS-UP</h4><h2>${toss}</h2></div>
        <div class="kpi"><h4>LOSE</h4><h2>${lose}</h2></div>
        <div class="kpi"><h4>MEMBERS</h4><h2>${totalMembers}</h2></div>
    `

    // ===== CHART =====
    let ctx = document.getElementById("statusChart").getContext("2d")

    if (chart) chart.destroy()

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['WIN', 'TOSS-UP', 'LOSE'],
            datasets: [{
                data: [win, toss, lose]
            }]
        }
    })
}

// filters
document.getElementById("search").addEventListener("input", render)
document.getElementById("provinceFilter").addEventListener("input", render)

// refresh
setInterval(loadData, 5000)

function drill(name){
    window.location.href = "/polling_intelligence?constituency=" + name
}

loadData()

</script>

{% endblock %}
