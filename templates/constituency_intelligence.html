<!DOCTYPE html>
<html>
<head>
    <title>Constituency Intelligence</title>
    <style>
        body {
            font-family: Arial;
            background: #0b1f0b;
            color: white;
            margin: 0;
        }

        .header {
            background: #145214;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: #1f3d1f;
        }

        tr:hover {
            background: #1a2e1a;
        }

        .WIN { color: #00ff88; font-weight: bold; }
        .LOSE { color: #ff4d4d; font-weight: bold; }
        .TOSS-UP { color: #ffcc00; font-weight: bold; }

        .card {
            display: inline-block;
            margin: 10px;
            padding: 15px;
            background: #132913;
            border-radius: 10px;
            min-width: 150px;
        }
    </style>
</head>
<body>

<div class="header">📊 Constituency Intelligence Dashboard</div>

<div id="summary"></div>

<table>
    <thead>
        <tr>
            <th>Constituency</th>
            <th>Province</th>
            <th>Members</th>
            <th>Voters</th>
            <th>Penetration %</th>
            <th>Margin</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>
fetch("/api/constituency_intelligence")
.then(res => res.json())
.then(data => {

    let tbody = document.getElementById("table-body");
    let summary = document.getElementById("summary");

    let win = 0, lose = 0, toss = 0;

    data.forEach(c => {

        if (c.status === "WIN") win++;
        else if (c.status === "LOSE") lose++;
        else toss++;

        let row = `
            <tr>
                <td>${c.constituency}</td>
                <td>${c.province}</td>
                <td>${c.members}</td>
                <td>${c.voters}</td>
                <td>${c.penetration}%</td>
                <td>${c.margin}</td>
                <td class="${c.status}">${c.status}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });

    summary.innerHTML = `
        <div class="card">WIN: ${win}</div>
        <div class="card">TOSS-UP: ${toss}</div>
        <div class="card">LOSE: ${lose}</div>
    `;
});
</script>

</body>
</html>
