<!DOCTYPE html>
<html>
<head>
    <title>Constituency Intelligence</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #0b6623;
            color: white;
        }

        /* STATUS COLORS */
        .WIN { background: #2e7d32; color: white; }
        .TOSS-UP { background: #f9a825; color: black; }
        .LOSE { background: #c62828; color: white; }
    </style>
</head>

<body>

<h2>Constituency Intelligence</h2>

<table>
    <tr>
        <th>Province</th>
        <th>Constituency</th>
        <th>Members</th>
        <th>Total Voters</th>
        <th>Stations</th>
        <th>Penetration</th>
        <th>Status</th>
    </tr>

    {% for r in results %}
    <tr class="{{ r.status }}">
        <td>{{ r.province }}</td>
        <td>{{ r.constituency }}</td>
        <td>{{ r.members }}</td>
        <td>{{ r.voters }}</td>
        <td>{{ r.stations }}</td>
        <td>{{ r.penetration }}%</td>
        <td><strong>{{ r.status }}</strong></td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
