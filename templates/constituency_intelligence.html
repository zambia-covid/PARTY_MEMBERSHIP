{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📊 Constituency Intelligence</h2>

<style>

/* ===== CONTROLS ===== */
.controls {
    padding: 10px;
    background: #f0f5f0;
    display: flex;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* ===== BADGES ===== */
.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 6px;
    background: #e0e0e0;
    margin-right: 5px;
    font-size: 12px;
}

/* ===== TABLE ===== */
.table-container {
    overflow-x: auto;
}

.intel-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    table-layout: fixed;
}

.intel-table th,
.intel-table td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.intel-table th {
    background: #0B5D1E;
    color: white;
    text-align: left;
}

.sortable { cursor: pointer; }
.sortable:hover { background: #145214; }

.num { text-align: center; }

.province-row {
    background: #0B5D1E;
    color: white;
    font-weight: bold;
}

.heat-win { background: rgba(0,200,0,0.15); }
.heat-toss { background: rgba(255,200,0,0.2); }
.heat-lose { background: rgba(255,0,0,0.15); }

.low-coverage { background: #330000 !important; color:white; }

.WIN, .LEANING\ WIN, .STRONGHOLD { color: green; font-weight: bold; }
.LOSE, .LEANING\ LOSS, .LOST { color: red; font-weight: bold; }
.TOSS-UP { color: orange; font-weight: bold; }

</style>

<!-- FILTERS -->
<div class="controls">
    <input type="text" id="search" placeholder="Search constituency...">
    <input type="text" id="provinceFilter" placeholder="Filter province...">
</div>

<div id="activeFilters" style="margin-bottom:10px;"></div>

<div class="table-container">
<table class="intel-table">

<thead>
<tr>
    <th class="sortable" onclick="sortTable('constituency')">Constituency</th>
    <th class="sortable" onclick="sortTable('province')">Province</th>
    <th class="sortable num" onclick="sortTable('members')">Members</th>
    <th class="sortable num" onclick="sortTable('voters')">Voters</th>
    <th class="sortable num" onclick="sortTable('penetration')">Penetration %</th>
    <th class="sortable num" onclick="sortTable('margin')">Margin</th>
    <th class="sortable num" onclick="sortTable('coverage')">Coverage %</th>
    <th class="sortable" onclick="sortTable('status')">Status</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>
</div>

<script>

let allData = []
let sortKey = null
let sortAsc = true

/* ================= LOAD DATA ================= */
async function loadData() {
    try {
        const res = await fetch("/api/constituency_intelligence")
        const data = await res.json()

        console.log("INTEL DATA:", data)

        allData = data
        render()
    } catch (e) {
        console.error("LOAD ERROR:", e)
    }
}

/* ================= SORT ================= */
function sortTable(key){
    if(sortKey === key){
        sortAsc = !sortAsc
    } else {
        sortKey = key
        sortAsc = true
    }
    render()
}

/* ================= NAVIGATION (FIXED) ================= */
function openConstituency(id){
    window.location.href = `/constituency_dashboard?id=${id}`
}

/* ================= RENDER ================= */
function render(){

    let tbody = document.getElementById("table-body")
    let badgeBox = document.getElementById("activeFilters")

    let search = (document.getElementById("search").value || "").toLowerCase()
    let provinceFilter = (document.getElementById("provinceFilter").value || "").toLowerCase()

    badgeBox.innerHTML = ""
    if(search) badgeBox.innerHTML += `<span class="badge">Search: ${search}</span>`
    if(provinceFilter) badgeBox.innerHTML += `<span class="badge">Province: ${provinceFilter}</span>`

    let data = allData.filter(c => {
        let con = (c.constituency || "").toLowerCase()
        let prov = (c.province || "").toLowerCase()

        return (
            (!search || con.includes(search) || prov.includes(search)) &&
            (!provinceFilter || prov.includes(provinceFilter))
        )
    })

    /* SORT */
    if(sortKey){
        data.sort((a,b) => {
            let x = a[sortKey]
            let y = b[sortKey]

            if(typeof x === "string"){
                return sortAsc ? x.localeCompare(y) : y.localeCompare(x)
            }
            return sortAsc ? x - y : y - x
        })
    }

    if(data.length === 0){
        tbody.innerHTML = `<tr><td colspan="8">No data available</td></tr>`
        return
    }

    /* GROUP BY PROVINCE */
    let grouped = {}

    data.forEach(c => {
        if(!grouped[c.province]) grouped[c.province] = []
        grouped[c.province].push(c)
    })

    let html = ""

    Object.keys(grouped).forEach(province => {

        html += `
        <tr class="province-row">
            <td colspan="8">${province}</td>
        </tr>
        `

        grouped[province].forEach(c => {

            let heat = "heat-toss"

            if(c.status && c.status.includes("WIN")) heat = "heat-win"
            else if(c.status && c.status.includes("LOSS")) heat = "heat-lose"

            let urgency = ""
            if((c.coverage || 0) < 30) urgency = "low-coverage"

            html += `
            <tr class="${heat} ${urgency}" 
                onclick="openConstituency(${c.constituency_id})"
                style="cursor:pointer">
                <td>${c.constituency}</td>
                <td>${c.province}</td>
                <td class="num">${c.members}</td>
                <td class="num">${c.voters}</td>
                <td class="num">${c.penetration}%</td>
                <td class="num">${c.margin}</td>
                <td class="num">${c.coverage || 0}%</td>
                <td class="${c.status}">${c.status}</td>
            </tr>
            `
        })
    })

    tbody.innerHTML = html
}

/* LISTENERS */
setTimeout(() => {
    document.getElementById("search").addEventListener("input", render)
    document.getElementById("provinceFilter").addEventListener("input", render)
}, 100)

/* AUTO REFRESH */
setInterval(loadData, 15000)

/* INIT */
loadData()

</script>

{% endblock %}
