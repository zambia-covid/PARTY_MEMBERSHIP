{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2>📊 Constituency Intelligence</h2>

<div id="status" style="margin-bottom:10px;color:gray;">Loading...</div>

<table border="1" cellpadding="8" cellspacing="0" style="width:100%;background:white;">
    <thead>
        <tr>
            <th>Constituency</th>
            <th>Province</th>
            <th>Members</th>
            <th>Voters</th>
            <th>Penetration</th>
            <th>Margin</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", async function(){

    const status = document.getElementById("status")
    const tbody = document.getElementById("table-body")

    try {
        console.log("Fetching data...")

        let res = await fetch("/api/constituency_intelligence")
        let data = await res.json()

        console.log("DATA:", data)

        status.innerText = "Loaded " + data.length + " constituencies"

        let html = ""

        data.forEach(c => {
            html += `
                <tr>
                    <td>${c.constituency}</td>
                    <td>${c.province}</td>
                    <td>${c.members}</td>
                    <td>${c.voters}</td>
                    <td>${c.penetration}</td>
                    <td>${c.margin}</td>
                    <td>${c.status}</td>
                </tr>
            `
        })

        tbody.innerHTML = html

    } catch (e) {
        console.error(e)
        status.innerText = "ERROR loading data"
    }

})
</script>

{% endblock %}
