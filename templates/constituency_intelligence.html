{% extends "base.html" %}

{% block title %}Constituency Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📊 Constituency Intelligence</h2>

<style>
/* page-specific styles only */
.controls {
    padding: 10px;
    background: #f0f5f0;
    display: flex;
    gap: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

th {
    background: #0B5D1E;
    color: white;
}

tr:hover {
    background: #f3f7f3;
    cursor: pointer;
}

.WIN { color: green; font-weight: bold; }
.LOSE { color: red; font-weight: bold; }
.TOSS-UP { color: orange; font-weight: bold; }

.danger {
    background: rgba(255,0,0,0.1);
}

.cards {
    margin-bottom: 15px;
}

.card-mini {
    display: inline-block;
    margin-right: 10px;
    padding: 12px;
    background: white;
    border-radius: 8px;
    min-width: 120px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
</style>

<!-- FILTERS -->
<div class="controls">
    <input type="text" id="search" placeholder="Search constituency...">
    <input type="text" id="provinceFilter" placeholder="Filter province...">
</div>

<!-- SUMMARY -->
<div class="cards" id="summary"></div>

<!-- TABLE -->
<table>
    <thead>
        <tr>
            <th>Constituency</th>
            <th>Province</th>
            <th>Members</th>
            <th>Voters</th>
            <th>Penetration %</th>
            <th>Margin</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>

let allData = []

async function loadData() {
    try {
        let res = await fetch("/api/constituency_intelligence")
        let data = await res.json()
        allData = data
        renderTable()
    } catch (e) {
        console.error("Failed to load data", e)
    }
}

function renderTable() {

    let tbody = document.getElementById("table-body")
    let summary = document.getElementById("summary")

    let search = document.getElementById("search").value.toLowerCase()
    let provinceFilter = document.getElementById("provinceFilter").value.toLowerCase()

    let win = 0, lose = 0, toss = 0
    let html = ""

    allData.forEach(c => {

        if (
            !c.constituency.toLowerCase().includes(search) &&
            !c.province.toLowerCase().includes(search)
        ) return

        if (provinceFilter && !c.province.toLowerCase().includes(provinceFilter)) return

        if (c.status === "WIN") win++
        else if (c.status === "LOSE") lose++
        else toss++

        let danger = (c.status === "LOSE" && c.margin < -500) ? "danger" : ""

        html += `
            <tr class="${danger}" onclick="drill('${c.constituency}')">
                <td>${c.constituency}</td>
                <td>${c.province}</td>
                <td>${c.members}</td>
                <td>${c.voters}</td>
                <td>${c.penetration}%</td>
                <td>${c.margin}</td>
                <td class="${c.status}">${c.status}</td>
            </tr>
        `
    })

    tbody.innerHTML = html

    summary.innerHTML = `
        <div class="card-mini">WIN<br><b>${win}</b></div>
        <div class="card-mini">TOSS-UP<br><b>${toss}</b></div>
        <div class="card-mini">LOSE<br><b>${lose}</b></div>
        <div class="card-mini">TOTAL<br><b>${win + lose + toss}</b></div>
    `
}

// filters
document.getElementById("search").addEventListener("input", renderTable)
document.getElementById("provinceFilter").addEventListener("input", renderTable)

// auto refresh
setInterval(loadData, 5000)

// drilldown
function drill(name){
    window.location.href = "/polling_intelligence?constituency=" + name
}

// initial load
loadData()

</script>

{% endblock %}
