{% extends "base.html" %}

{% block title %}Ward Intelligence{% endblock %}

{% block content %}

<h2 style="margin-bottom:15px;">📡 Ward Intelligence</h2>

<style>
body { font-family: Arial; background:#f5f5f5; }

.controls {
    margin-bottom: 15px;
}

select {
    padding:8px;
    border-radius:6px;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
}

.card {
    background:white;
    padding:12px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.list-item {
    padding:8px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.green { background:#e6ffe6; }
.red { background:#ffe6e6; }
.orange { background:#fff4e6; }

.low { border-left:5px solid red; }

.kpi {
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:14px;
}
</style>

<div class="controls">
    <select id="constituencySelect"></select>
</div>

<div class="grid">

    <!-- LEFT: WARDS -->
    <div class="card">
        <h4>Wards</h4>

        <div class="kpi">
            <span>Total: <b id="totalWards">0</b></span>
            <span>Strongholds: <b id="strongholds">0</b></span>
            <span>Risk: <b id="risk">0</b></span>
            <span>Coverage: <b id="coverage">0%</b></span>
        </div>

        <div id="wardList">Loading...</div>
    </div>

    <!-- RIGHT: STATIONS -->
    <div class="card">
        <h4>Polling Stations</h4>
        <div id="stations">Select a ward</div>
    </div>

</div>

<script>

let currentConstituency = null;

/* ================= LOAD CONSTITUENCIES ================= */
async function loadConstituencies(){
    const res = await fetch("/api/constituencies");
    const data = await res.json();

    const select = document.getElementById("constituencySelect");

    select.innerHTML = data.map(c =>
        `<option value="${c.id}">${c.constituency_name}</option>`
    ).join("");

    currentConstituency = data[0].id;

    select.addEventListener("change", () => {
        currentConstituency = select.value;
        loadWardIntelligence();
    });

    loadWardIntelligence();
}

/* ================= LOAD WARDS ================= */
async function loadWardIntelligence(){

    const res = await fetch(`/api/ward_intelligence/${currentConstituency}`);
    const data = await res.json();

    console.log("WARD DATA:", data);

    if (!Array.isArray(data) || data.length === 0){
        document.getElementById("wardList").innerHTML = "No data";
        return;
    }

    let html = "";
    let total = data.length;
    let strong = 0;
    let risk = 0;
    let coverageTotal = 0;

    data.forEach(w => {

        const pf = w.pf_votes || 0;
        const upnd = w.upnd_votes || 0;
        const margin = w.margin || 0;
        const coverage = w.coverage || 0;

        coverageTotal += coverage;

        let color = "orange";
        let extra = "";

        if (w.status === "STRONGHOLD"){
            color = "green";
            strong++;
        }
        else if (w.status.includes("LOSS")){
            color = "red";
            risk++;
        }

        if (coverage < 30){
            extra = "low";
        }

        html += `
        <div class="list-item ${color} ${extra}" onclick="loadStations(${w.ward_id})">
            <strong>${w.ward}</strong><br>
            PF: ${pf} | UPND: ${upnd}<br>
            Margin: ${margin}<br>
            Coverage: ${coverage}%
        </div>`;
    });

    document.getElementById("wardList").innerHTML = html;

    document.getElementById("totalWards").innerText = total;
    document.getElementById("strongholds").innerText = strong;
    document.getElementById("risk").innerText = risk;

    let avgCoverage = (coverageTotal / total).toFixed(1);
    document.getElementById("coverage").innerText = avgCoverage + "%";
}

/* ================= LOAD STATIONS ================= */
async function loadStations(ward_id){

    const res = await fetch(`/api/station_drilldown/${ward_id}`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0){
        document.getElementById("stations").innerHTML = "No stations";
        return;
    }

    let html = "";

    data.forEach(s => {

        let color = "orange";

        if (s.margin > 0) color = "green";
        else if (s.margin < 0) color = "red";

        html += `
        <div class="list-item ${color}">
            <strong>${s.station}</strong><br>
            PF: ${s.pf} | UPND: ${s.upnd}<br>
            Margin: ${s.margin}
        </div>`;
    });

    document.getElementById("stations").innerHTML = html;
}

/* ================= INIT ================= */
loadConstituencies();

</script>

{% endblock %}
