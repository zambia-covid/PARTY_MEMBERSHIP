{% extends "base.html" %}

{% block title %}Ward Intelligence{% endblock %}

{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h2>🧭 Ward Intelligence</h2>

<style>
body {
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

select {
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border-radius:8px;
    border:none;
    font-size:15px;
}

/* GRID */
.page {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
    height:65vh;
}

@media(max-width:768px){
    .page { 
        grid-template-columns:1fr; 
        height:auto;
    }
}

/* CARDS */
.card {
    background:#111;
    padding:15px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
}

/* SCROLL */
.scroll-box {
    flex:1;
    overflow-y:auto;
}

/* LIST ITEMS */
.list-item {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
    transition:0.2s;
}

.list-item:hover {
    background:#1a1a1a;
}

/* ACTIVE */
.active-ward {
    background:#003300 !important;
    border-left:4px solid #00ff00;
}

/* COLORS */
.green { color:#00ff00; }
.red { color:#ff4444; }
.orange { color:#ffaa00; }

.low-coverage { background:#2a0000; }

/* KPI */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
    margin-bottom:15px;
}
</style>

<!-- 🔥 DRILLDOWN -->
<select id="provinceSelect"></select>
<select id="constituencySelect"></select>

<!-- KPI -->
<div class="grid">
    <div class="card"><h4>Total</h4><p id="totalWards">0</p></div>
    <div class="card"><h4>Strongholds</h4><p id="strongholds">0</p></div>
    <div class="card"><h4>Risk</h4><p id="risk">0</p></div>
    <div class="card"><h4>Coverage</h4><p id="coverage">0%</p></div>
</div>

<!-- SIDE BY SIDE -->
<div class="page">

<div class="card">
    <h4>Ward Breakdown</h4>
    <div id="wardList" class="scroll-box">Loading...</div>
</div>

<div class="card">
    <h4>📍 Stations</h4>
    <div id="stations" class="scroll-box">Select a ward</div>
</div>

</div>

<script>

let currentConstituency = null;
let selectedWard = null;

/* ================= PROVINCES ================= */
async function loadProvinces(){

    const res = await fetch("/api/provinces_list");
    const data = await res.json();

    const select = document.getElementById("provinceSelect");

    select.innerHTML = data.map(p =>
        `<option value="${p}">${p}</option>`
    ).join("");

    select.addEventListener("change", () => {
        loadConstituencies(select.value);
    });

    loadConstituencies(data[0]);
}

/* ================= CONSTITUENCIES ================= */
async function loadConstituencies(province){

    const res = await fetch(`/api/constituencies_by_province/${province}`);
    const data = await res.json();

    const select = document.getElementById("constituencySelect");

    select.innerHTML = data.map(c =>
        `<option value="${c.id}">${c.constituency_name}</option>`
    ).join("");

    currentConstituency = data[0]?.id;

    select.addEventListener("change", () => {
        currentConstituency = select.value;
        loadWardIntelligence();
    });

    loadWardIntelligence();
}

/* ================= WARD CLICK ================= */
function selectWard(element, ward_id){

    document.querySelectorAll(".list-item")
        .forEach(el => el.classList.remove("active-ward"));

    element.classList.add("active-ward");

    selectedWard = ward_id;

    loadStations(ward_id);
}

/* ================= LOAD WARDS ================= */
async function loadWardIntelligence(){

    if (!currentConstituency) return;

    const res = await fetch(`/api/ward_intelligence/${currentConstituency}`);
    const data = await res.json();

    console.log("WARD DATA:", data);

    if (!Array.isArray(data) || data.length === 0){
        document.getElementById("wardList").innerHTML = "No ward data";
        return;
    }

    let html = "";
    let total = data.length;
    let strong = 0;
    let risk = 0;
    let coverageTotal = 0;

    data.forEach(w => {

        const coverage = w.coverage || 0;
        const margin = w.margin || 0;

        coverageTotal += coverage;

        let color = "orange";
        let extra = "";

        if (w.status === "STRONGHOLD"){
            color = "green";
            strong++;
        }
        else if (w.status.includes("LOSS")){
            color = "red";
            risk++;
        }

        if (coverage < 30){
            extra = "low-coverage";
        }

        html += `
        <div class="list-item ${color} ${extra}" 
             onclick="selectWard(this, ${w.ward_id})">
            <strong>${w.ward}</strong><br>
            Margin: ${margin}<br>
            Coverage: ${coverage}%
        </div>`;
    });

    document.getElementById("wardList").innerHTML = html;

    document.getElementById("totalWards").innerText = total;
    document.getElementById("strongholds").innerText = strong;
    document.getElementById("risk").innerText = risk;
    document.getElementById("coverage").innerText =
        (coverageTotal / total).toFixed(1) + "%";

    /* 🔥 AUTO SELECT FIRST WARD */
    setTimeout(()=>{
        const first = document.querySelector("#wardList .list-item");
        if(first){
            first.click();
        }
    }, 200);
}

/* ================= LOAD STATIONS ================= */
async function loadStations(ward_id){

    const res = await fetch(`/api/station_drilldown/${ward_id}`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0){
        document.getElementById("stations").innerHTML = "No stations";
        return;
    }

    let html = "";

    data.forEach(s => {

        let color = "orange";

        if (s.margin > 0) color = "green";
        else if (s.margin < 0) color = "red";

        html += `
        <div class="list-item ${color}">
            <strong>${s.station}</strong><br>
            PF: ${s.pf} | UPND: ${s.upnd}<br>
            Margin: ${s.margin}
        </div>`;
    });

    document.getElementById("stations").innerHTML = html;
}

/* ================= INIT ================= */
loadProvinces();

</script>

{% endblock %}
