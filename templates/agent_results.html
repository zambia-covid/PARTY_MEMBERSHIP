<!DOCTYPE html>
<html>
<head>
    <title>Agent Results</title>

    <!-- MOBILE SCALING -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0b5d1e;
            color: white;
            margin: 0;
            padding: 10px;
        }

        h2 {
            text-align: center;
            font-size: 20px;
        }

        .card {
            background: white;
            color: black;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .row {
            font-size: 14px;
            margin: 3px 0;
        }

        .votes {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-weight: bold;
        }

        .pf { color: green; }
        .upnd { color: red; }
        .other { color: #555; }

        .status {
            margin-top: 6px;
            font-weight: bold;
        }

        .win { color: green; }
        .lose { color: red; }
        .tie { color: orange; }
    </style>
</head>

<body>

<h2>📊 Live Agent Results</h2>

{% for r in results %}
<div class="card">

    <div class="title">
        {{ r[3] }} ({{ r[2] }})
    </div>

    <div class="row">Agent: {{ r[0] }}</div>
    <div class="row">Province: {{ r[1] }}</div>

    <div class="votes">
        <span class="pf">PF: {{ r[4] }}</span>
        <span class="upnd">UPND: {{ r[5] }}</span>
        <span class="other">Other: {{ r[6] }}</span>
    </div>

    {% if r[4] > r[5] %}
        <div class="status win">Winning</div>
    {% elif r[4] < r[5] %}
        <div class="status lose">Losing</div>
    {% else %}
        <div class="status tie">Tied</div>
    {% endif %}

</div>
{% endfor %}

</body>
</html>
