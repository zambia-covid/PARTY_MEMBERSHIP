<!DOCTYPE html>
<html>
<head>
    <title>Campaign Command Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0b1f0b;
            color:white;
        }

        /* NAV */
        .nav{
            display:flex;
            background:#0b6623;
        }

        .nav div{
            padding:15px;
            cursor:pointer;
        }

        .nav div:hover{
            background:#084d1a;
        }

        .active{
            background:#084d1a;
        }

        /* SECTIONS */
        .section{
            display:none;
            padding:20px;
        }

        .show{
            display:block;
        }

        /* TABLE */
        table{
            width:100%;
            border-collapse:collapse;
        }

        td, th{
            padding:10px;
            border-bottom:1px solid #333;
        }

        .WIN{color:#00ff88;}
        .LOSE{color:#ff4444;}
        .TOSS-UP{color:#ffaa00;}

        /* MAP */
        #zambiaMap path{
            stroke:#222;
            stroke-width:1;
            transition:0.3s;
        }

        /* AI PANEL */
        .ai-panel{
            background:#111;
            padding:15px;
            margin-top:20px;
            border-left:5px solid #0b6623;
        }
    </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div onclick="showTab('war')" class="active">War Room</div>
    <div onclick="showTab('map')">Map</div>
    <div onclick="showTab('targets')">Turnout</div>
</div>

<!-- ================= WAR ROOM ================= -->
<div id="war" class="section show">

    <h3>Live Intelligence</h3>

    <table>
        <thead>
            <tr>
                <th>Constituency</th>
                <th>PF</th>
                <th>UPND</th>
                <th>Margin</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="warTable"></tbody>
    </table>

    <!-- AI STRATEGY -->
    <div class="ai-panel">
        <h3>AI Strategic Advice</h3>
        <div id="adviceBox">Loading...</div>
    </div>

</div>

<!-- ================= MAP ================= -->
<div id="map" class="section">

    <h3>Zambia Heat Map</h3>

    <!-- SIMPLE SVG (replace later with real Zambia map) -->
    <svg viewBox="0 0 500 500" id="zambiaMap">

        <path id="Lusaka" d="M100,100 L150,100 L150,150 L100,150 Z"/>
        <path id="Ndola" d="M200,100 L250,100 L250,150 L200,150 Z"/>
        <path id="Kitwe" d="M300,100 L350,100 L350,150 L300,150 Z"/>
        <path id="Livingstone" d="M100,250 L150,250 L150,300 L100,300 Z"/>

    </svg>

</div>

<!-- ================= TARGETS ================= -->
<div id="targets" class="section">

    <h3>Turnout Targets</h3>

    <table>
        <thead>
            <tr>
                <th>Station</th>
                <th>Gap</th>
                <th>Priority</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="targetsTable"></tbody>
    </table>

</div>

<script>

/* ================= TAB CONTROL ================= */
function showTab(tab){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
    document.getElementById(tab).classList.add('show');

    document.querySelectorAll('.nav div').forEach(n => n.classList.remove('active'));
    event.target.classList.add('active');
}

/* ================= WAR ROOM ================= */
async function loadWar(){

    const res = await fetch("/api/live_dashboard");
    const data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `
        <tr>
            <td>${d.constituency}</td>
            <td>${d.pf}</td>
            <td>${d.upnd}</td>
            <td>${d.margin}</td>
            <td class="${d.status}">${d.status}</td>
        </tr>`;
    });

    document.getElementById("warTable").innerHTML = html;
}

/* ================= MAP ================= */
async function loadMap(){

    const res = await fetch("/api/map_intelligence");
    const data = await res.json();

    const colors = {
        strong_pf: "#006400",
        lean_pf: "#32CD32",
        strong_upnd: "#8B0000",
        lean_upnd: "#FF6347",
        neutral: "#777"
    };

    data.map.forEach(c => {

        let el = document.getElementById(c.constituency);
        if(!el) return;

        el.style.fill = colors[c.heat] || "#777";

        el.onclick = () => {
            alert(
                `${c.constituency}
PF: ${c.pf}
UPND: ${c.upnd}
Margin: ${c.margin}`
            );
        };
    });

    /* ALERT FLASHING */
    data.alerts.forEach(a => {

        let el = document.getElementById(a.constituency);
        if(!el) return;

        el.style.stroke = "yellow";
        el.style.strokeWidth = "3";

        setInterval(() => {
            el.style.opacity = el.style.opacity == 0.5 ? 1 : 0.5;
        }, 500);
    });
}

/* ================= TARGETS ================= */
async function loadTargets(){

    const res = await fetch("/api/turnout_targets");
    const data = await res.json();

    let html = "";

    data.forEach(t => {
        html += `
        <tr>
            <td>${t.station}</td>
            <td>${t.gap}</td>
            <td>${t.priority}</td>
            <td>
                <button onclick="mobilize('${t.station}')">
                    Mobilize
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("targetsTable").innerHTML = html;
}

function mobilize(station){
    fetch(`/mobilize/${station}`)
    .then(r => r.text())
    .then(alert);
}

/* ================= AI STRATEGY ================= */
async function loadStrategy(){
    const res = await fetch("/api/strategy");
    const data = await res.json();

    document.getElementById("adviceBox").innerText = data.advice;
}

/* ================= AUTO REFRESH ================= */
setInterval(loadWar, 5000);
setInterval(loadMap, 7000);
setInterval(loadTargets, 8000);
setInterval(loadStrategy, 15000);

loadWar();
loadMap();
loadTargets();
loadStrategy();

</script>

</body>
</html>
