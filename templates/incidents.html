<!DOCTYPE html>
<html>
<head>
<title>Incident Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#111; color:white; margin:0; }

.header {
    background:#b30000;
    padding:15px;
    font-size:20px;
    text-align:center;
}

.navbar{
    padding:10px;
    background:#000;
    display:flex;
    justify-content:center;
    gap:10px;
}
.navbar a{
    padding:10px 16px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}
.map-btn{ background:#006400; color:white; }
.report-btn{ background:#b30000; color:white; }

.container { padding:10px; }

table {
    width:100%;
    background:white;
    color:black;
    border-collapse:collapse;
}

th, td {
    padding:8px;
    border-bottom:1px solid #ddd;
}

th{
    background:#b30000;
    color:white;
}

tr:hover{
    background:#eee;
    cursor:pointer;
}

img{
    width:60px;
    height:60px;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="header">🚨 Incident Command Center</div>

<div class="navbar">
    <a href="/incident_map" class="map-btn">🛰️ Map View</a>
    <a href="/report_incident" class="report-btn">➕ Report Incident</a>
</div>

<div class="container">

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Type</th>
    <th>District</th>
    <th>Description</th>
    <th>Photo</th>
    <th>Status</th>
    <th>Date</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="incidentFeed"></tbody>
</table>

</div>

<script>

function goToMap(lat, lng, id){
    if(!lat || !lng){
        alert("No GPS data for this incident");
        return;
    }
    window.location.href = `/incident_map?lat=${lat}&lng=${lng}&id=${id}`;
}

async function loadIncidents(){

    const res = await fetch("/api/incidents");
    const data = await res.json();

    const tbody = document.getElementById("incidentFeed");
    tbody.innerHTML = "";

    data.slice(0,100).forEach(i=>{

        tbody.innerHTML += `
        <tr onclick="goToMap('${i.lat}','${i.lng}','${i.id}')">
            <td>${i.id}</td>
            <td>${i.type || ""}</td>
            <td>${i.district || ""}</td>
            <td>${i.description || ""}</td>
            <td>${i.photo ? `<img src="/static/uploads/${i.photo}">` : ""}</td>
            <td>${i.status}</td>
            <td>${i.created_at}</td>
            <td>
                ${i.status !== "Resolved"
                    ? `<button onclick="event.stopPropagation(); resolveIncident('${i.id}')">Resolve</button>`
                    : "—"}
            </td>
        </tr>`;
    });
}

async function resolveIncident(id){
    await fetch(`/resolve/${id}`, { method:"POST" });
    loadIncidents();
}

loadIncidents();

</script>

</body>
</html>
