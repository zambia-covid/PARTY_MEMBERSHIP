<!DOCTYPE html>
<html>
<head>
    <title>Incident Command Center</title>

    <style>
        :root {
            --bg: #0b1220;
            --panel: #111827;
            --panel-light: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #374151;

            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --info: #3b82f6;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .search-box input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: var(--panel);
            color: var(--text);
            width: 250px;
        }

        .card {
            background: var(--panel);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--panel-light);
        }

        th {
            text-align: left;
            padding: 14px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 1px;
        }

        td {
            padding: 14px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .high { background: rgba(239,68,68,0.15); color: var(--danger); }
        .medium { background: rgba(245,158,11,0.15); color: var(--warning); }
        .low { background: rgba(16,185,129,0.15); color: var(--success); }

        .status-open {
            color: var(--danger);
            font-weight: 600;
        }

        .status-resolved {
            color: var(--success);
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-resolve {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .meta {
            font-size: 12px;
            color: var(--muted);
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>⚠ Incident Command Center</h2>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search incidents...">
        </div>
    </div>

    <div class="card">
        <table id="incidentTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Description</th>
                    <th>Severity</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for i in incidents %}
                <tr>
                    <td>{{ i.id }}</td>

                    <td>
                        <strong>{{ i.type }}</strong>
                        <div class="meta">{{ i.province }}</div>
                    </td>

                    <td>
                        {{ i.constituency }}
                    </td>

                    <td>
                        {{ i.description }}
                    </td>

                    <td>
                        <span class="badge
                            {% if i.severity == 'HIGH' %}high
                            {% elif i.severity == 'MEDIUM' %}medium
                            {% else %}low{% endif %}
                        ">
                            {{ i.severity }}
                        </span>
                    </td>

                    <td class="
                        {% if i.status == 'Open' %}status-open
                        {% else %}status-resolved{% endif %}
                    ">
                        {{ i.status }}
                    </td>

                    <td class="meta">
                        {{ i.created_at }}
                    </td>

                    <td>
                        <div class="actions">

                            {% if i.status == 'Open' %}
                            <a href="/resolve_incident/{{ i.id }}">
                                <button class="btn btn-resolve">Resolve</button>
                            </a>
                            {% endif %}

                            <a href="/delete_incident/{{ i.id }}">
                                <button class="btn btn-delete">Delete</button>
                            </a>

                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

<script>
    const searchInput = document.getElementById("search");
    const table = document.getElementById("incidentTable").getElementsByTagName("tbody")[0];

    searchInput.addEventListener("keyup", function() {
        let filter = searchInput.value.toLowerCase();
        let rows = table.getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText.toLowerCase();
            rows[i].style.display = text.includes(filter) ? "" : "none";
        }
    });
</script>

</body>
</html>
