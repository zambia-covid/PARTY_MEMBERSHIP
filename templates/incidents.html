<!DOCTYPE html>
<html>
<head>
<title>Incident Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
}

.header {
    background: #b30000;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

/* CRITICAL STRIP */
.critical-strip{
    background:#300;
    padding:8px;
    overflow-x:auto;
    white-space:nowrap;
}
.critical-item{
    display:inline-block;
    background:red;
    padding:5px 10px;
    margin-right:6px;
    border-radius:6px;
    font-size:12px;
}

/* CONTAINER */
.container { padding: 15px; }

/* PANELS */
.grid{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.panel{
    flex:1;
    padding:12px;
    border-radius:6px;
    text-align:center;
    font-weight:bold;
}
.critical{ background:#8b0000; }
.warning{ background:#cc5500; }
.success{ background:#006400; }

/* SEARCH */
input{
    padding:10px;
    width:100%;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
}

/* TABLE */
.table-wrap{
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
    color:black;
    table-layout:fixed;
}

th, td {
    padding:8px;
    border-bottom:1px solid #ddd;
    word-wrap:break-word;
}

th{
    background:#b30000;
    color:white;
}

img{
    width:60px;
    border-radius:6px;
}

button{
    padding:6px;
    border:none;
    border-radius:4px;
    background:green;
    color:white;
}
</style>
</head>

<body>

<div class="header">🚨 Incident Command Center</div>

<!-- 🔴 CRITICAL STRIP -->
<div id="criticalStrip" class="critical-strip"></div>

<div class="container">

<div class="grid">
    <div class="panel critical">Critical<br><span id="criticalCount">0</span></div>
    <div class="panel warning">Open<br><span id="openCount">0</span></div>
    <div class="panel success">Resolved<br><span id="resolvedCount">0</span></div>
</div>

<input id="searchBox" placeholder="Search incidents...">

<div class="table-wrap">
<table>
<thead>
<tr>
    <th>ID</th>
    <th>Type</th>
    <th>Location</th>
    <th>Description</th>
    <th>Photo</th>
    <th>Status</th>
    <th>Date</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="incidentFeed"></tbody>
</table>
</div>

</div>

<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

let lastCritical = 0;

async function loadIncidents(){

    const q = document.getElementById("searchBox").value.toLowerCase();

    const res = await fetch("/api/incidents");
    const data = await res.json();

    let critical=0, open=0, resolved=0;

    const tbody = document.getElementById("incidentFeed");
    const strip = document.getElementById("criticalStrip");

    tbody.innerHTML = "";
    strip.innerHTML = "";

    // 🔴 LIMIT FEED (IMPORTANT)
    data.slice(0, 100).forEach(i=>{

        const desc = (i.description || "").toLowerCase();
        if(q && !desc.includes(q)) return;

        if(i.status==="Critical"){
            critical++;
            strip.innerHTML += `<span class="critical-item">${i.type} - ${i.location}</span>`;
        }
        else if(i.status==="Open") open++;
        else resolved++;

        tbody.innerHTML += `
        <tr>
            <td>${i.id}</td>
            <td>${i.type || ""}</td>
            <td>${i.location || ""}</td>
            <td>${i.description || ""}</td>
            <td>${i.photo ? `<img src="/static/uploads/${i.photo}">` : ""}</td>
            <td style="color:${
                i.status==="Critical" ? "red" :
                i.status==="Open" ? "orange" : "green"
            }">${i.status}</td>
            <td>${i.created_at}</td>
            <td>
                ${i.status !== "Resolved"
                    ? `<button onclick="resolveIncident('${i.id}')">Resolve</button>`
                    : "—"}
            </td>
        </tr>`;
    });

    document.getElementById("criticalCount").innerText = critical;
    document.getElementById("openCount").innerText = open;
    document.getElementById("resolvedCount").innerText = resolved;

    if(critical > lastCritical){
        document.getElementById("alertSound").play();
    }

    lastCritical = critical;
}

setInterval(loadIncidents, 5000);
loadIncidents();

async function resolveIncident(id){
    await fetch(`/resolve/${id}`, { method:"POST" });
    loadIncidents();
}

document.getElementById("searchBox").addEventListener("input", loadIncidents);

</script>

</body>
</html>
