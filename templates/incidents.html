<!DOCTYPE html>
<html>
<head>
<title>Incident Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

/* HEADER */
.header{
    background:#b30000;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

/* CRITICAL STRIP */
.critical-strip{
    background:#300;
    padding:10px;
    overflow-x:auto;
    white-space:nowrap;
}

.critical-item{
    display:inline-block;
    background:red;
    padding:6px 10px;
    margin-right:8px;
    border-radius:6px;
    font-size:12px;
}

/* HOTSPOTS */
.hotspots{
    padding:10px;
    background:#1a1a1a;
}

.hotspot{
    padding:6px;
    border-bottom:1px solid #333;
}

/* FILTERS */
.filters{
    padding:10px;
    background:#222;
}

select, input{
    width:100%;
    padding:10px;
    margin-top:5px;
}

/* FEED */
.feed{
    padding:10px;
}

.card{
    background:white;
    color:black;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}

.status-critical{ color:red; }
.status-open{ color:orange; }
.status-resolved{ color:green; }

button{
    width:100%;
    padding:10px;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="header">🚨 Command Center</div>

<!-- 🔴 CRITICAL STRIP -->
<div id="criticalStrip" class="critical-strip"></div>

<!-- 🔥 HOTSPOTS -->
<div class="hotspots">
<h4>🔥 Hotspots</h4>
<div id="hotspotList"></div>
</div>

<!-- 🔎 FILTERS -->
<div class="filters">
<input id="searchBox" placeholder="Search...">
<select id="statusFilter">
<option value="">All Status</option>
<option>Critical</option>
<option>Open</option>
<option>Resolved</option>
</select>
</div>

<!-- 📡 FEED -->
<div id="incidentFeed" class="feed"></div>

<script>

let lastData = [];

async function load(){

    const res = await fetch("/api/incidents");
    const data = await res.json();

    renderCritical(data);
    renderHotspots(data);
    renderFeed(data);

    lastData = data;
}

/* 🔴 CRITICAL STRIP */
function renderCritical(data){
    const strip = document.getElementById("criticalStrip");
    strip.innerHTML = "";

    data.filter(i=>i.status==="Critical").slice(0,10).forEach(i=>{
        strip.innerHTML += `
        <span class="critical-item">
            ${i.type} - ${i.location}
        </span>`;
    });
}

/* 🔥 HOTSPOTS */
function renderHotspots(data){

    const map = {};

    data.forEach(i=>{
        const loc = i.location || "Unknown";
        map[loc] = (map[loc] || 0) + 1;
    });

    const sorted = Object.entries(map)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5);

    const box = document.getElementById("hotspotList");
    box.innerHTML = "";

    sorted.forEach(([loc,count])=>{
        box.innerHTML += `<div class="hotspot">${loc} — ${count}</div>`;
    });
}

/* 📡 FEED */
function renderFeed(data){

    const q = document.getElementById("searchBox").value.toLowerCase();
    const statusFilter = document.getElementById("statusFilter").value;

    const container = document.getElementById("incidentFeed");
    container.innerHTML = "";

    data.slice(0,50).forEach(i=>{

        if(q && !(i.description || "").toLowerCase().includes(q)) return;
        if(statusFilter && i.status !== statusFilter) return;

        const statusClass =
            i.status==="Critical" ? "status-critical" :
            i.status==="Open" ? "status-open" :
            "status-resolved";

        container.innerHTML += `
        <div class="card">
            <strong>${i.type}</strong><br>
            <small>${i.location}</small><br>

            ${i.description || ""}

            ${i.photo ? `<img src="/static/uploads/${i.photo}" width="100%">` : ""}

            <div class="${statusClass}">${i.status}</div>

            ${i.status !== "Resolved"
                ? `<button onclick="resolve('${i.id}')">Resolve</button>`
                : ""}
        </div>`;
    });
}

/* ACTION */
async function resolve(id){
    await fetch(`/resolve/${id}`, {method:"POST"});
    load();
}

/* EVENTS */
document.getElementById("searchBox").addEventListener("input", load);
document.getElementById("statusFilter").addEventListener("change", load);

/* REFRESH */
setInterval(load, 5000);
load();

</script>

</body>
</html>
