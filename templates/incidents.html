<!DOCTYPE html>
<html>
<head>
<title>Incident Command Center</title>

<style>
body { font-family:Arial; background:#111; color:white; }
.panel { padding:15px; margin:5px; display:inline-block; }
table { width:100%; background:white; color:black; }
</style>
</head>

<body>

<h2>🚨 Command Center</h2>

<div>
    <div class="panel" id="criticalCount">0</div>
    <div class="panel" id="openCount">0</div>
    <div class="panel" id="resolvedCount">0</div>
</div>

<table>
<thead>
<tr>
<th>ID</th><th>Type</th><th>Location</th><th>Status</th><th>Photo</th>
</tr>
</thead>
<tbody id="feed"></tbody>
</table>

<script>
async function load(){
    const res = await fetch("/api/incidents");
    const data = await res.json();

    let html="";
    data.forEach(i=>{
        html += `<tr>
        <td>${i.id}</td>
        <td>${i.type}</td>
        <td>${i.location}</td>
        <td>${i.status}</td>
        <td>${i.photo ? `<img src="/static/uploads/${i.photo}" width="60">` : ""}</td>
        </tr>`;
    });

    document.getElementById("feed").innerHTML = html;
}

setInterval(load,5000);
load();
</script>

</body>
</html>
