{% extends "base.html" %}

{% block title %}Constituency Command{% endblock %}

{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h2>⚔️ War Room</h2>

<div>
    <select id="constituencySelect"></select>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b0b0b; color:white; font-family:Arial; }
.card { background:#111; padding:10px; margin:10px 0; border-radius:6px; }
.scroll-box { max-height:250px; overflow-y:auto; }
.list-item { padding:6px; border-bottom:1px solid #222; }
.win { color:#00ff00; }
.lose { color:#ff4444; }
.tie { color:#ffaa00; }
</style>

<div class="card">
    <h4>Status</h4>
    <h3 id="status"></h3>
    <p id="margin"></p>
</div>

<div class="card">
    <h4>Ward Intelligence</h4>
    <div id="wards" class="scroll-box">Loading...</div>
</div>

<div class="card">
    <h4>🚨 Risk Zones</h4>
    <div id="danger" class="scroll-box"></div>
</div>

<script>

let currentConstituency = null;

/* ================= LOAD CONSTITUENCIES ================= */
async function loadConstituencies(){

    const res = await fetch("/api/constituencies");
    const data = await res.json();

    if (!data || data.length === 0){
        console.error("No constituencies found");
        return;
    }

    const select = document.getElementById("constituencySelect");

    select.innerHTML = data.map(c =>
        `<option value="${c.id}">${c.constituency_name}</option>`
    ).join("");

    currentConstituency = data[0].id;

    select.addEventListener("change", () => {
        currentConstituency = select.value;
        loadDashboard();
    });

    loadDashboard();
}

/* ================= MAIN DASHBOARD ================= */
async function loadDashboard(){

    if (!currentConstituency) return;

    try {
        const res = await fetch(`/api/constituency_dashboard/${currentConstituency}`);
        const data = await res.json();

        document.getElementById("margin").innerText = "Margin: " + (data.margin || 0);

        const statusEl = document.getElementById("status");
        statusEl.innerText = data.status || "NO DATA";

        statusEl.className =
            data.status === "WINNING" ? "win" :
            data.status === "LOSING" ? "lose" : "tie";

        loadWardIntelligence();

    } catch (err){
        console.error("DASHBOARD ERROR:", err);
    }
}

/* ================= WARD INTELLIGENCE ================= */
async function loadWardIntelligence(){

    try {
        const res = await fetch(`/api/ward_intelligence/${currentConstituency}`);
        const data = await res.json();

        console.log("WARD DATA:", data);

        if (!Array.isArray(data) || data.length === 0){
            document.getElementById("wards").innerHTML = "No ward data available";
            document.getElementById("danger").innerHTML = "None";
            return;
        }

        let html = "";
        let dangerHTML = "";

        data.forEach(w => {

            const pf = w.pf_votes || 0;
            const upnd = w.upnd_votes || 0;
            const margin = w.margin || 0;
            const stations = w.stations || 0;
            const reporting = w.reporting || 0;
            const coverage = w.coverage || 0;
            const status = w.status || "";

            let color = "#ffaa00";
            if (status === "STRONGHOLD") color = "#00ff00";
            else if (status.includes("LOSS")) color = "#ff4444";

            html += `
            <div class="list-item" style="color:${color}">
                <strong>${w.ward}</strong><br>
                PF: ${pf} | UPND: ${upnd}<br>
                Margin: ${margin}<br>
                Stations: ${reporting}/${stations} (${coverage}%)
            </div>`;

            if (status.includes("LOSS")) {
                dangerHTML += `
                <div class="list-item" style="color:red;">
                    ${w.ward} (${margin})
                </div>`;
            }
        });

        document.getElementById("wards").innerHTML = html;
        document.getElementById("danger").innerHTML = dangerHTML || "None";

    } catch (err) {
        console.error("WARD LOAD ERROR:", err);
        document.getElementById("wards").innerHTML = "Error loading ward data";
    }
}

/* ================= INIT ================= */
loadConstituencies();

</script>

{% endblock %}
