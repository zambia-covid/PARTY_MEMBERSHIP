{% extends "base.html" %}

{% block title %}Constituency Command{% endblock %}

{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h2 style="margin-bottom:10px;">⚔️ War Room</h2>

<!-- ================= SELECTOR ================= -->
<div class="selector">
    <select id="constituencySelect"></select>
    <small id="selectorNote" style="opacity:0.6;"></small>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
}

.selector select {
    width:100%;
    padding:10px;
    font-size:16px;
    border-radius:6px;
    margin-bottom:4px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.card {
    background:#111;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

.win { color:#00ff00; }
.lose { color:#ff4444; }
.tie { color:#ffaa00; }

.section { margin-top:12px; }

.scroll-box {
    max-height:250px;
    overflow-y:auto;
}

.list-item {
    padding:6px;
    border-bottom:1px solid #222;
    font-size:13px;
}

.split {
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

@media(min-width:768px){
    .split {
        grid-template-columns:2fr 1fr;
    }
}
</style>

<!-- ================= KPI ================= -->
<div class="grid">
    <div class="card">
        <h4>Presidential</h4>
        <p>PF: <b id="pf_pres"></b></p>
        <p>UPND: <b id="upnd_pres"></b></p>
    </div>

    <div class="card">
        <h4>Parliamentary</h4>
        <p>PF: <b id="pf_parl"></b></p>
        <p>UPND: <b id="upnd_parl"></b></p>
    </div>

    <div class="card">
        <h4>Status</h4>
        <h3 id="status"></h3>
        <p id="margin"></p>
    </div>

    <div class="card">
        <h4>Coverage</h4>
        <p><b id="coverage"></b>%</p>
    </div>

    <div class="card">
        <h4>Turnout</h4>
        <p><b id="turnout"></b>%</p>
    </div>
</div>

<!-- ================= CHART ================= -->
<div class="section card">
    <h4>Ward Performance</h4>
    <canvas id="wardChart" style="max-height:250px;"></canvas>
</div>

<!-- ================= CONTENT ================= -->
<div class="section split">
    <div class="card">
        <h4>Ward Breakdown</h4>
        <div id="wards" class="scroll-box"></div>
    </div>

    <div class="card">
        <h4>🚨 Risk Zones</h4>
        <div id="danger" class="scroll-box"></div>
    </div>
</div>

<script>

let chart;
let currentConstituency = "";
let lastLoaded = "";

/* ================= LOAD CONSTITUENCIES ================= */
async function loadConstituencies(){

    const res = await fetch("/api/constituencies");
    const data = await res.json();

    const select = document.getElementById("constituencySelect");
    const note = document.getElementById("selectorNote");

    if(!data || data.length === 0){
        select.innerHTML = `<option>No constituencies</option>`;
        select.disabled = true;
        note.innerText = "No access assigned";
        return;
    }

    select.innerHTML = data.map(c =>
        `<option value="${c}">${c}</option>`
    ).join("");

    currentConstituency = data[0];

    // 🔒 LOCK LOGIC
    if(data.length === 1){
        select.disabled = true;
        note.innerText = "Locked to your constituency";
    } else {
        select.disabled = false;
        note.innerText = "";
        select.addEventListener("change", changeConstituency);
    }

    loadDashboard();
}

/* ================= CHANGE ================= */
function changeConstituency(){
    const newVal = document.getElementById("constituencySelect").value;

    // Prevent unnecessary reload
    if(newVal === currentConstituency) return;

    currentConstituency = newVal;
    loadDashboard();
}

/* ================= LOAD DASHBOARD ================= */
async function loadDashboard(){

    if(!currentConstituency) return;

    // Prevent duplicate refresh loops
    if(currentConstituency === lastLoaded) return;

    lastLoaded = currentConstituency;

    const res = await fetch(`/api/constituency_dashboard/${currentConstituency}`);
    const data = await res.json();

    pf_pres.innerText = data.presidential.pf;
    upnd_pres.innerText = data.presidential.upnd;

    pf_parl.innerText = data.parliamentary.pf;
    upnd_parl.innerText = data.parliamentary.upnd;

    margin.innerText = "Margin: " + data.margin;

    status.innerText = data.status;
    status.className =
        data.status === "WINNING" ? "win" :
        data.status === "LOSING" ? "lose" : "tie";

    coverage.innerText = data.coverage;
    turnout.innerText = data.turnout;

    let labels=[], pfData=[], upndData=[];
    let wardsHTML="";

    data.wards.forEach(w=>{
        labels.push(w.ward);
        pfData.push(w.pf);
        upndData.push(w.upnd);

        let color =
            w.status.includes("WIN") || w.status==="STRONGHOLD" ? "#00ff00" :
            w.status.includes("LOSS") || w.status==="LOST" ? "#ff4444" :
            "#ffaa00";

        wardsHTML += `
        <div class="list-item" style="color:${color}">
            ${w.ward}<br>
            PF:${w.pf} | UPND:${w.upnd}
        </div>`;
    });

    wards.innerHTML = wardsHTML;

    danger.innerHTML = data.danger_zones.map(d =>
        `<div class="list-item" style="color:red;">${d.ward} (${d.margin})</div>`
    ).join("") || "None";

    if(chart) chart.destroy();

    chart = new Chart(wardChart, {
        type:"bar",
        data:{
            labels:labels,
            datasets:[
                {label:"PF", data:pfData},
                {label:"UPND", data:upndData}
            ]
        },
        options:{
            responsive:true,
            plugins:{legend:{labels:{color:"white"}}},
            scales:{
                x:{ticks:{color:"white"}},
                y:{ticks:{color:"white"}}
            }
        }
    });
}

/* ================= INIT ================= */
loadConstituencies();
setInterval(loadDashboard, 30000);

</script>

{% endblock %}
