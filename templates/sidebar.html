<style>

/* SIDEBAR BASE (GREEN THEME) */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #063312;   /* deep green */
    color: #e6ffe6;
    position: fixed;
    left: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    padding-top: 10px;
}

/* LOGO */
.sidebar .logo {
    width: 100%;
    text-align: center;
    font-weight: bold;
    padding: 15px 10px;
    color: #ffffff;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* SECTION LABELS */
.menu-section {
    padding: 8px 15px;
    font-size: 11px;
    color: #a3d9a5;
    margin-top: 10px;
}

/* LINKS */
.sidebar a {
    display: block;
    padding: 8px 15px;
    text-decoration: none;
    color: #e6ffe6;
    font-size: 13px;
    transition: 0.2s;
}

/* HOVER */
.sidebar a:hover {
    background: #0a4d1f;
    color: #ffffff;
}

/* ACTIVE */
.sidebar a.active {
    background: #0a4d1f;
    color: #00ff88;
    border-left: 3px solid #00ff88;
}

/* LOGOUT */
.sidebar .logout {
    margin-top: auto;
    color: #ff6b6b;
}

.sidebar .logout:hover {
    background: #4d0a0a;
    color: #ff6b6b;
}

</style>

<div class="sidebar">

    <!-- LOGO -->
    <div class="logo">PF PAMODZI ALLIANCE COMMAND</div>

    <!-- CORE -->
    <div class="menu-section">CORE</div>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
    <a href="/war_room" class="{% if request.path.startswith('/war_room') %}active{% endif %}">War Room</a>

    <!-- INTELLIGENCE -->
    <div class="menu-section">INTELLIGENCE</div>
    <a href="/polling_intelligence" class="{% if 'polling_intelligence' in request.path %}active{% endif %}">Polling Intelligence</a>
    <a href="/constituency_intelligence" class="{% if 'constituency_intelligence' in request.path %}active{% endif %}">Constituency Intel</a>

    <!-- FIELD OPS -->
    <div class="menu-section">FIELD OPS</div>
    <a href="/agents" class="{% if 'agents' in request.path %}active{% endif %}">Agents</a>
    <a href="/agent_results" class="{% if 'agent_results' in request.path %}active{% endif %}">Agent Results</a>

    <!-- INCIDENTS -->
    <div class="menu-section">INCIDENTS</div>
    <a href="/incidents" class="{% if 'incidents' in request.path %}active{% endif %}">Incident Feed</a>

    <!-- MEMBERS -->
    <div class="menu-section">MEMBERS</div>
    <a href="/members?key={{config.ADMIN_KEY}}" class="{% if 'members' in request.path %}active{% endif %}">Members</a>

    <!-- SYSTEM -->
    <div class="menu-section">SYSTEM</div>
    <a href="/logout" class="logout">Logout</a>

</div>
