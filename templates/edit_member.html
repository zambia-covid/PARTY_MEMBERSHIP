<!DOCTYPE html>
<html>

<head>
<title>Edit Member</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #ecfdf5;
    font-family: Arial, Helvetica, sans-serif;
    color: #065f46;
    margin: 0;
    padding: 0;
}

/* NAVBAR */
.navbar {
    background: #16a34a;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.navbar a:hover {
    text-decoration: underline;
}

/* CARD */
.card {
    background: #065f46;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
}

/* FORM */
.form-label {
    font-weight: 500;
    color: #d1fae5;
}

.form-control {
    background: #10b981;
    border: 1px solid #065f46;
    color: white;
}

.form-control:focus {
    border-color: #22c55e;
    box-shadow: none;
    background: #10b981;
    color: white;
}

/* BUTTONS */
.btn-success {
    background: #22c55e;
    border: none;
}

.btn-success:hover {
    background: #16a34a;
}

.btn-secondary {
    background: #065f46;
    border: none;
    color: white;
}

.btn-secondary:hover {
    background: #047857;
}

</style>
</head>

<body>

<nav class="navbar">
    <span class="navbar-brand">Campaign System</span>
    <div>
        <a href="/" class="btn btn-sm btn-secondary me-2">Dashboard</a>
        <a href="/members" class="btn btn-sm btn-secondary">Members</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card">

                <h3 class="mb-4">Edit Member</h3>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Membership ID</label>
                        <input type="text" class="form-control" value="{{ member.membership_id }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ member.full_name }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Province</label>
                            <input type="text" name="province" class="form-control" value="{{ member.province }}" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">District</label>
                            <input type="text" name="district" class="form-control" value="{{ member.district }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Constituency</label>
                        <input type="text" name="constituency" class="form-control" value="{{ member.constituency }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ member.phone }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-control">
                            <option value="Active" {% if member.status == "Active" %}selected{% endif %}>Active</option>
                            <option value="Inactive" {% if member.status == "Inactive" %}selected{% endif %}>Inactive</option>
                            <option value="Suspended" {% if member.status == "Suspended" %}selected{% endif %}>Suspended</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/members" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Update Member</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
