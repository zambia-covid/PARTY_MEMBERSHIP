<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Command{% endblock %}</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: #0B5D1E;
    color: white;
    display: flex;
    flex-direction: column;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

/* sections */
.menu-section {
    font-size: 11px;
    opacity: 0.7;
    padding: 15px 20px 5px;
    letter-spacing: 1px;
}

/* links */
.sidebar a {
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    display: block;
    transition: 0.2s;
}

/* hover */
.sidebar a:hover {
    background: #083D14;
    padding-left: 25px;
}

/* ACTIVE LINK */
.sidebar a.active {
    background: #FFD700;
    color: black;
    font-weight: bold;
}

/* 🔴 LOGOUT BUTTON (UPDATED) */
.logout-btn {
    margin: 20px;
    padding: 12px;
    background: #8b0000;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-align: left;
}

.logout-btn:hover {
    background: red;
}

/* ===== MAIN ===== */
.main {
    margin-left: 260px;
    padding: 20px;
}

/* cards */
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

    <div class="sidebar">

        <div class="logo">PF Command</div>

        {% include "sidebar.html" %}

        <!-- 🔴 SAFE LOGOUT FORM -->
        <form method="POST" action="/logout" id="logoutForm">
            <button type="button" class="logout-btn" onclick="confirmLogout()">
                ⛔ Logout
            </button>
        </form>

    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

<script>
function confirmLogout(){
    if(confirm("Are you sure you want to logout?")){
        document.getElementById("logoutForm").submit();
    }
}
</script>

</body>
</html>
