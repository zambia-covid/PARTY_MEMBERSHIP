<!DOCTYPE html>
<html>

<head>
<title>Campaign Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #ecfdf5;
}

/* NAVBAR */
.navbar {
    background: #16a34a;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* CONTAINER */
.container {
    padding: 30px;
}

/* CARD */
.card {
    background: #065f46;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 25px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    color: white;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #10b981;
    text-align: left;
    color: white;
}

th {
    background: #047857;
}

/* CHART WRAPPER */
.chart-box {
    height: 400px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Campaign Analytics</h2>
    <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/members">Members</a>
        <a href="/polling_intelligence">Polling Intelligence</a>
    </div>
</div>

<div class="container">

<!-- CHART -->
<div class="card">
    <h3>Province Membership Chart</h3>
    <div class="chart-box">
        <canvas id="provinceChart"></canvas>
    </div>
</div>

<!-- TABLE -->
<div class="card">
    <h3>Members by Province</h3>

    <table>
        <tr>
            <th>Province</th>
            <th>Total Members</th>
        </tr>

        {% for p in provinces %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</div>

<!-- SAFE DATA INJECTION -->
<script>
const provinces = JSON.parse('{{ provinces | tojson | safe }}' || "[]");

const labels = provinces.map(p => p[0]);
const data = provinces.map(p => p[1]);

const ctx = document.getElementById("provinceChart").getContext("2d");

new Chart(ctx, {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Members",
            data: data,
            backgroundColor: "#34d399"
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            title: {
                display: true,
                text: "Members per Province",
                color: "white",
                font: { size: 16 }
            }
        },
        scales: {
            x: {
                ticks: { color: "white" },
                grid: { color: "#064e3b" }
            },
            y: {
                ticks: { color: "white" },
                grid: { color: "#064e3b" }
            }
        }
    }
});
</script>

</body>
</html>
