<!DOCTYPE html>
<html>
<head>
<title>Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{ box-sizing:border-box; font-family:Arial; }

body{
    margin:0;
    background:linear-gradient(135deg,#0b5d1e,#063312);
    color:white;
}

.header{
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:15px;
    max-width:500px;
    margin:auto;
}

.card{
    background:white;
    color:black;
    padding:18px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    margin-bottom:15px;
}

label{
    font-size:13px;
    font-weight:bold;
    margin-top:12px;
    display:block;
}

input, select{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#0b5d1e;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.helper{
    font-size:11px;
    color:#666;
}
</style>
</head>

<body>

<div class="header">👤 Create User</div>

<div class="container">

<!-- 🔴 SINGLE USER -->
<div class="card">
<form method="POST" id="userForm">

<label>Phone</label>
<input name="phone" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Role</label>
<select name="role" required>
    <option value="">Select Role</option>
    <option value="admin">Admin</option>
    <option value="manager">Manager</option>
    <option value="agent">Agent</option>
    <option value="guest">Guest</option>
</select>

<label>Province</label>
<select id="provinceSelect" name="province" required></select>

<label>Constituency</label>
<select id="constituencySelect" name="constituency" required></select>

<label>Polling Station</label>
<input name="polling_station">

<button>Create User</button>

</form>
</div>

<!-- 🔴 BULK UPLOAD -->
<div class="card">
<h3>📋 Bulk Upload (CSV)</h3>

<form method="POST" action="/bulk_upload_users" enctype="multipart/form-data">
    <input type="file" name="file" accept=".csv" required>
    <button>Upload CSV</button>
</form>

<div class="helper">
Format: phone,password,role,province,constituency,polling_station
</div>

</div>

</div>

<script>

/* 🔽 LOAD PROVINCES */
async function loadProvinces(){
    const res = await fetch("/api/provinces_list");
    const data = await res.json();

    let html = '<option value="">Select Province</option>';

    data.forEach(p=>{
        html += `<option value="${p}">${p}</option>`;
    });

    document.getElementById("provinceSelect").innerHTML = html;
}

/* 🔽 LOAD CONSTITUENCIES */
async function loadConstituencies(province){

    const res = await fetch(`/api/constituencies?province=${province}`);
    const data = await res.json();

    let html = '<option value="">Select Constituency</option>';

    data.forEach(c=>{
        html += `<option value="${c}">${c}</option>`;
    });

    document.getElementById("constituencySelect").innerHTML = html;
}

/* LISTENER */
document.getElementById("provinceSelect").addEventListener("change", function(){
    const province = this.value;
    if(province){
        loadConstituencies(province);
    }
});

/* INIT */
loadProvinces();

</script>

</body>
</html>
