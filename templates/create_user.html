<!DOCTYPE html>
<html>
<head>
<title>Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background:#0b5d1e;
    color:white;
    margin:0;
}

.header{
    padding:15px;
    background:#063312;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:12px;
}

label{
    font-size:13px;
    font-weight:bold;
    margin-top:12px;
    display:block;
}

input, select{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.note{
    font-size:12px;
    color:gray;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">👤 Create User</div>

<div class="container">
<div class="card">

<form method="POST" id="userForm">

<label>Username</label>
<input name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Role</label>
<select name="role" id="roleSelect" required>
    <option value="">Select role</option>
    <option value="national_manager">National Manager</option>
    <option value="provincial_manager">Provincial Manager</option>
    <option value="district_agent">District Agent</option>
</select>

<label>Province</label>
<select name="province" id="provinceSelect">
    <option value="">Select province</option>
    <option>Lusaka</option>
    <option>Copperbelt</option>
    <option>Central</option>
    <option>Eastern</option>
    <option>Western</option>
    <option>Southern</option>
    <option>Northern</option>
    <option>Luapula</option>
    <option>Muchinga</option>
    <option>North-Western</option>
</select>

<div class="note" id="provinceNote"></div>

<label>District</label>
<input name="district" id="districtInput" placeholder="Type district (e.g. Kabwata, Chipata, Kasama)">

<div class="note">
If district is not in system, type it manually.
</div>

<button type="submit">Create User</button>

</form>

</div>
</div>

<script>
// ELEMENTS
const roleSelect = document.getElementById("roleSelect");
const provinceSelect = document.getElementById("provinceSelect");
const provinceNote = document.getElementById("provinceNote");
const districtInput = document.getElementById("districtInput");

// ROLE CONTROL LOGIC
roleSelect.addEventListener("change", function(){

    const role = this.value;

    // NATIONAL MANAGER
    if(role === "national_manager"){
        provinceSelect.value = "";
        provinceSelect.disabled = true;
        provinceNote.innerText = "National managers operate across all provinces.";
    }

    // PROVINCIAL MANAGER
    else if(role === "provincial_manager"){
        provinceSelect.disabled = false;
        provinceNote.innerText = "Assign a province for this manager.";
    }

    // DISTRICT AGENT
    else if(role === "district_agent"){
        provinceSelect.disabled = false;
        provinceNote.innerText = "Assign province and district.";
    }

    else{
        provinceSelect.disabled = false;
        provinceNote.innerText = "";
    }
});

// BASIC VALIDATION BEFORE SUBMIT
document.getElementById("userForm").addEventListener("submit", function(e){

    const role = roleSelect.value;
    const province = provinceSelect.value;
    const district = districtInput.value;

    if(role !== "national_manager" && !province){
        e.preventDefault();
        alert("Province is required for this role.");
        return;
    }

    if(role === "district_agent" && !district){
        e.preventDefault();
        alert("District is required for district agents.");
        return;
    }

});
</script>

</body>
</html>
