<!DOCTYPE html>
<html>
<head>
<title>Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background:#0b1f3a;
    color:white;
    margin:0;
}

.header{
    padding:15px;
    background:#06132a;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
}

label{
    font-size:13px;
    font-weight:bold;
    margin-top:12px;
    display:block;
}

input, select{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#b30000;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.hidden{
    display:none;
}

.role-info{
    margin-top:10px;
    font-size:13px;
    color:#555;
}
</style>
</head>

<body>

<div class="header">👤 Create System User</div>

<div class="container">
<div class="card">

<form method="POST">

<label>Phone</label>
<input name="phone" placeholder="e.g. 097xxxxxxx" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Role</label>
<select name="role" id="roleSelect" required>
    <option value="">Select role</option>
    <option value="agent">Agent</option>
    <option value="provincial_manager">Provincial Manager</option>
    <option value="national_manager">National Manager</option>
    <option value="admin">Admin</option>
</select>

<div class="role-info" id="roleInfo"></div>

<!-- LOCATION FIELDS -->

<div id="provinceGroup">
<label>Province</label>
<input name="province" id="province">
</div>

<div id="constituencyGroup">
<label>Constituency</label>
<input name="constituency" id="constituency">
</div>

<div id="stationGroup">
<label>Polling Station</label>
<input name="polling_station" id="polling_station">
</div>

<button type="submit">Create User</button>

</form>

</div>
</div>

<script>

// =======================
// ROLE LOGIC
// =======================
const roleSelect = document.getElementById("roleSelect");

const provinceGroup = document.getElementById("provinceGroup");
const constituencyGroup = document.getElementById("constituencyGroup");
const stationGroup = document.getElementById("stationGroup");

const roleInfo = document.getElementById("roleInfo");

function updateForm(){

    const role = roleSelect.value;

    // Reset
    provinceGroup.classList.remove("hidden");
    constituencyGroup.classList.remove("hidden");
    stationGroup.classList.remove("hidden");

    roleInfo.innerText = "";

    if(role === "agent"){
        roleInfo.innerText = "Agent: Assigned to specific constituency and station.";

    } else if(role === "provincial_manager"){

        constituencyGroup.classList.add("hidden");
        stationGroup.classList.add("hidden");

        roleInfo.innerText = "Provincial Manager: Access limited to one province.";

    } else if(role === "national_manager"){

        provinceGroup.classList.add("hidden");
        constituencyGroup.classList.add("hidden");
        stationGroup.classList.add("hidden");

        roleInfo.innerText = "National Manager: Full system access.";

    } else if(role === "admin"){

        provinceGroup.classList.add("hidden");
        constituencyGroup.classList.add("hidden");
        stationGroup.classList.add("hidden");

        roleInfo.innerText = "Admin: Full control including user management.";
    }
}

roleSelect.addEventListener("change", updateForm);

</script>

</body>
</html>
