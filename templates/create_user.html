<!DOCTYPE html>
<html>
<head>
<title>Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{ box-sizing:border-box; font-family:Arial; }

body{
    margin:0;
    background:linear-gradient(135deg,#0b5d1e,#063312);
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:15px;
    max-width:500px;
    margin:auto;
}

/* CARD */
.card{
    background:white;
    color:black;
    padding:18px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* LABEL */
label{
    display:block;
    font-size:13px;
    font-weight:bold;
    margin-top:14px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:16px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:#0b5d1e;
    color:white;
    font-size:16px;
    font-weight:bold;
}

button:active{
    transform:scale(0.98);
}

/* STATUS */
.status{
    text-align:center;
    font-size:12px;
    margin-top:10px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="header">👤 Create User</div>

<div class="container">

<div class="card">

<form method="POST" id="userForm">

<label>Phone Number</label>
<input name="phone" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Role</label>
<select name="role" required>
    <option value="">Select Role</option>
    <option value="admin">Admin</option>
    <option value="manager">Manager</option>
    <option value="agent">Agent</option>
    <option value="guest">Guest</option>
</select>

<label>Province</label>
<select name="province" required>
    <option value="">Select Province</option>
    <option>Lusaka</option>
    <option>Copperbelt</option>
    <option>Central</option>
    <option>Eastern</option>
    <option>Southern</option>
    <option>Northern</option>
    <option>Muchinga</option>
    <option>Luapula</option>
    <option>Western</option>
    <option>North-Western</option>
</select>

<label>Constituency</label>
<input name="constituency" placeholder="Enter constituency">

<label>Polling Station</label>
<input name="polling_station" placeholder="Optional">

<button type="submit" id="submitBtn">Create User</button>

</form>

<div class="status" id="statusText"></div>

</div>

</div>

<script>

/* ⏳ LOADING STATE */
document.getElementById("userForm").addEventListener("submit", function(){
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Creating...";
    btn.disabled = true;
});

/* 📡 NETWORK STATUS */
function updateStatus(){
    const el = document.getElementById("statusText");

    if(navigator.onLine){
        el.innerText = "Online";
        el.style.color = "lightgreen";
    } else {
        el.innerText = "Offline — submission may fail";
        el.style.color = "orange";
    }
}

window.addEventListener("online", updateStatus);
window.addEventListener("offline", updateStatus);
updateStatus();

</script>

</body>
</html>
