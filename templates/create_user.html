<!DOCTYPE html>
<html>
<head>
<title>Create User</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0b5d1e; color:white; padding:15px; }
.card { background:white; color:black; padding:15px; border-radius:12px; }
input, select { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
button { width:100%; padding:14px; margin-top:15px; background:green; color:white; border:none; border-radius:8px; font-weight:bold; }
</style>
</head>

<body>

<h2>Create User</h2>

<div class="card">
<form method="POST">

<input name="phone" placeholder="Phone" required>
<input name="password" placeholder="Password" required>

<select name="role" required>
    <option value="">Select Role</option>
    <option value="admin">Admin (Full Access)</option>
    <option value="manager">Manager (Oversight)</option>
    <option value="agent">Agent (Field)</option>
    <option value="guest">Guest (View Only)</option>
</select>

<input name="province" placeholder="Province">
<input name="constituency" placeholder="Constituency">
<input name="polling_station" placeholder="Polling Station">

<button>Create User</button>

</form>
</div>

</body>
</html>
