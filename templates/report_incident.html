<!DOCTYPE html>
<html>
<head>
<title>Report Incident</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background:#0b5d1e;
    color:white;
    margin:0;
}

.header{
    padding:15px;
    background:#063312;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:12px;
}

label{
    font-size:13px;
    font-weight:bold;
    margin-top:12px;
    display:block;
}

input, select, textarea{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

textarea{
    min-height:120px;
}

.file{
    background:#f4f4f4;
    padding:10px;
}

button{
    width:100%;
    padding:16px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:16px;
    font-weight:bold;
}

#preview{
    margin-top:10px;
    width:100%;
    border-radius:8px;
    display:none;
}

#districtDisplay{
    background:#eee;
    font-weight:bold;
}

.hidden{
    display:none;
}

.override-warning{
    font-size:12px;
    color:orange;
    margin-top:5px;
}

.gps-status{
    font-size:12px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">🚨 Report Incident</div>

<div class="container">
<div class="card">

<form method="POST" enctype="multipart/form-data" id="incidentForm">

<label>Incident Type</label>
<select name="type" required>
    <option value="">Select type</option>
    <option>Violence</option>
    <option>Fraud</option>
    <option>Intimidation</option>
    <option>Logistics</option>
</select>

<label>Province</label>
<input name="province" required>

<label>Constituency</label>
<input name="constituency" id="constituencyInput" required>

<label>District (Auto-detected)</label>
<input id="districtDisplay" readonly>

<label>
<input type="checkbox" id="overrideToggle"> Override district
</label>

<div id="manualDistrictGroup" class="hidden">
    <label>Enter District</label>
    <input name="district_manual" id="districtManual" placeholder="Type district manually">
    <div class="override-warning">⚠️ Manual override used — ensure accuracy</div>
</div>

<label>Severity</label>
<select name="severity" required>
    <option value="">Select severity</option>
    <option>Critical</option>
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
</select>

<label>Description</label>
<textarea name="description" required></textarea>

<label>Photo (optional)</label>
<input class="file" type="file" name="photo" accept="image/*" id="photoInput">

<img id="preview">

<label>GPS Location</label>
<div class="gps-status" id="gpsStatus">Detecting location...</div>

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<button type="submit" id="submitBtn">Submit Incident</button>

</form>

</div>
</div>

<script>
// IMAGE PREVIEW
const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("preview");

photoInput.addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
});

// DISTRICT MAPPING
const mapping = {
    "kabwata": "lusaka",
    "kamwala": "lusaka",
    "munali": "lusaka",
    "chadiza": "chadiza",
    "chipata central": "chipata"
};

function normalize(v){
    return (v || "").toLowerCase().trim();
}

const constituencyInput = document.getElementById("constituencyInput");
const districtDisplay = document.getElementById("districtDisplay");

const overrideToggle = document.getElementById("overrideToggle");
const manualGroup = document.getElementById("manualDistrictGroup");
const manualInput = document.getElementById("districtManual");

constituencyInput.addEventListener("input", function(){
    const key = normalize(this.value);

    if(mapping[key]){
        districtDisplay.value = mapping[key];
        districtDisplay.style.color = "green";
    } else {
        districtDisplay.value = "Unknown";
        districtDisplay.style.color = "orange";
    }
});

overrideToggle.addEventListener("change", function(){
    if(this.checked){
        manualGroup.classList.remove("hidden");
        districtDisplay.style.opacity = 0.5;
    } else {
        manualGroup.classList.add("hidden");
        districtDisplay.style.opacity = 1;
        manualInput.value = "";
    }
});

// GPS
const latInput = document.getElementById("latitude");
const lonInput = document.getElementById("longitude");
const gpsStatus = document.getElementById("gpsStatus");

function getLocation(){
    if (!navigator.geolocation) {
        gpsStatus.innerText = "GPS not supported";
        return;
    }

    gpsStatus.innerText = "Getting GPS location...";

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            latInput.value = pos.coords.latitude;
            lonInput.value = pos.coords.longitude;

            gpsStatus.innerText = "Location captured ✔";
            gpsStatus.style.color = "green";
        },
        (err) => {
            console.error(err);
            gpsStatus.innerText = "GPS failed. Enable location.";
            gpsStatus.style.color = "red";
        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

window.addEventListener("load", getLocation);

// FORCE GPS BEFORE SUBMIT
document.getElementById("incidentForm").addEventListener("submit", function(e){
    if(!latInput.value || !lonInput.value){
        e.preventDefault();
        alert("GPS location is required before submitting.");
        getLocation();
    }
});
</script>

</body>
</html>
