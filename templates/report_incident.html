<!DOCTYPE html>
<html>
<head>
    <title>Report Incident</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0b5d1e;
            color: white;
            margin: 0;
            padding: 15px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 12px;
        }

        textarea, select, input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: red;
            color: white;
            font-weight: bold;
        }

        .critical { background:red; color:white; }
        .high { background:orange; color:black; }
        .medium { background:gold; color:black; }
        .low { background:green; color:white; }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>🚨 Report Incident</h2>

<div class="card">
    <form method="POST">

        <!-- INCIDENT TYPE -->
        <label>Incident Type</label>
        <select name="type" required>
            <option value="">Select type</option>
            <option value="Violence">Violence</option>
            <option value="Fraud">Fraud</option>
            <option value="Intimidation">Intimidation</option>
            <option value="Logistics">Logistics Issue</option>
            <option value="Other">Other</option>
        </select>

        <!-- LOCATION -->
        <label>Province</label>
        <input name="province" placeholder="Province" required>

        <label>Constituency</label>
        <input name="constituency" placeholder="Constituency" required>

        <!-- SEVERITY -->
        <label>Severity</label>
        <select name="severity" required>
            <option value="">Select severity</option>
            <option value="Critical" class="critical">Critical</option>
            <option value="High" class="high">High</option>
            <option value="Medium" class="medium">Medium</option>
            <option value="Low" class="low">Low</option>
        </select>

        <!-- DESCRIPTION -->
        <label>Description</label>
        <textarea name="description" placeholder="Describe the incident..." required></textarea>

        <!-- OPTIONAL CONTACT -->
        <label>Contact (optional)</label>
        <input name="contact" placeholder="Phone or name">

        <button type="submit">🚨 Report Incident</button>

    </form>
</div>

<a href="{{ url_for('agent_dashboard') }}">⬅ Back to Dashboard</a>

</body>
</html>
