<!DOCTYPE html>
<html>
<head>
<title>Report Incident</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; background:#0b5d1e; color:white; padding:15px; }
.card { background:white; color:black; padding:15px; border-radius:12px; }
input, select, textarea { width:100%; padding:12px; margin-top:10px; border-radius:8px; }
button { width:100%; padding:14px; margin-top:15px; background:red; color:white; border:none; }
</style>
</head>

<body>

<h2>🚨 Report Incident</h2>

<div class="card">
<form method="POST" enctype="multipart/form-data">

<select name="type" required>
<option value="">Type</option>
<option>Violence</option>
<option>Fraud</option>
<option>Intimidation</option>
</select>

<input name="province" placeholder="Province" required>
<input name="constituency" placeholder="Constituency" required>

<select name="severity" required>
<option value="">Severity</option>
<option>Critical</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<textarea name="description" placeholder="Describe incident..." required></textarea>

<input type="file" name="photo" accept="image/*">

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
