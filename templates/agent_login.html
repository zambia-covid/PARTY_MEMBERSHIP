<!DOCTYPE html>
<html>
<head>
    <title>Agent Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0b5d1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            width: 92%;
            max-width: 360px;
            background: #ffffff;
            padding: 22px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #0b5d1e;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px; /* prevents mobile zoom */
            outline: none;
        }

        input:focus {
            border-color: #0b5d1e;
            box-shadow: 0 0 5px rgba(11,93,30,0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #0b5d1e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            margin-top: 10px;
            color: red;
            text-align: center;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Agent Login</h2>

    <form method="POST">
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer">
        Secure Agent Access Portal
    </div>
</div>

</body>
</html>
