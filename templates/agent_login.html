<!DOCTYPE html>
<html>
<head>
<title>Agent Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1f0b;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#112;
    padding:30px;
    width:90%;
    max-width:350px;
    border-radius:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#00cc44;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:6px;
}

button:hover{
    background:#009933;
}
</style>
</head>

<body>

<form class="box" method="POST">
    <h2>🛰 Agent Access</h2>

    <input name="username" placeholder="Agent ID" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

</body>
</html>
