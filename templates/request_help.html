<!DOCTYPE html>
<html>
<head>
    <title>Request Help</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0b5d1e;
            color: white;
            margin: 0;
            padding: 15px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 12px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: orange;
            color: white;
            font-weight: bold;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>Request Help</h2>

<div class="card">
    <form method="POST">
        <textarea name="message" placeholder="Describe your issue..." required></textarea>
        <button type="submit">Send Request</button>
    </form>
</div>

<a href="{{ url_for('agent_dashboard') }}">⬅ Back to Dashboard</a>

</body>
</html>
