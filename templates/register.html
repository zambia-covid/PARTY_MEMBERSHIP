<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Registration</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0B5D1E, #032d0d);
    margin: 0;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #083D14;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

h2 { text-align: center; }
p { text-align:center;font-size:13px;color:#c8e6c9; }

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

input:focus, select:focus {
    outline: 2px solid gold;
}

button {
    width: 100%;
    padding: 14px;
    background: gold;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background: #999;
}

.success {
    background:#004d00;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    display:none;
}

.error {
    background:#660000;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>RP Pamodzi Alliance</h2>
<p>Join the MZ8 Movement</p>

<div id="successBox" class="success"></div>
<div id="errorBox" class="error"></div>

<form id="regForm">

<input type="text" name="full_name" placeholder="Full Name" required>

<select id="province" name="province" required></select>
<select id="district" name="district" required></select>
<select id="constituency" name="constituency" required></select>
<select id="ward" name="ward" required></select>

<input type="text" name="phone" placeholder="+260XXXXXXXXX" required>

<button id="submitBtn">Register Now</button>

</form>

</div>
</div>

<script>

/* ================= LOAD HIERARCHY ================= */

async function loadProvinces(){
    let res = await fetch("/api/provinces_list");
    let data = await res.json();

    let select = document.getElementById("province");
    select.innerHTML = `<option value="">Select Province</option>` +
        data.map(p=>`<option>${p}</option>`).join("");
}

async function loadDistricts(){
    let province = provinceEl.value;

    let res = await fetch(`/api/districts/${province}`);
    let data = await res.json();

    districtEl.innerHTML = `<option value="">Select District</option>` +
        data.map(d=>`<option>${d}</option>`).join("");
}

async function loadConstituencies(){
    let district = districtEl.value;

    let res = await fetch(`/api/constituencies/${district}`);
    let data = await res.json();

    constituencyEl.innerHTML = `<option value="">Select Constituency</option>` +
        data.map(c=>`<option>${c}</option>`).join("");
}

async function loadWards(){
    let constituency = constituencyEl.value;

    let res = await fetch(`/api/wards/${constituency}`);
    let data = await res.json();

    wardEl.innerHTML = `<option value="">Select Ward</option>` +
        data.map(w=>`<option>${w}</option>`).join("");
}

/* ================= REFERENCES ================= */
const provinceEl = document.getElementById("province");
const districtEl = document.getElementById("district");
const constituencyEl = document.getElementById("constituency");
const wardEl = document.getElementById("ward");

/* ================= CASCADE ================= */
provinceEl.onchange = loadDistricts;
districtEl.onchange = loadConstituencies;
constituencyEl.onchange = loadWards;

/* ================= SUBMIT ================= */
document.getElementById("regForm").onsubmit = async (e)=>{
    e.preventDefault();

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Registering...";

    let formData = new FormData(e.target);

    try{
        let res = await fetch("/register", {
            method:"POST",
            body: formData
        });

        let text = await res.text();

        document.getElementById("successBox").style.display = "block";
        document.getElementById("successBox").innerText = text;

        document.getElementById("errorBox").style.display = "none";

        e.target.reset();

    } catch(err){
        document.getElementById("errorBox").style.display = "block";
        document.getElementById("errorBox").innerText = "Registration failed";
    }

    btn.disabled = false;
    btn.innerText = "Register Now";
}

/* INIT */
loadProvinces();

</script>

</body>
</html>
