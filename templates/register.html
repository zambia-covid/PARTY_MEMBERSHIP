<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Registration</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0B5D1E, #032d0d);
    margin: 0;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #083D14;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

p {
    text-align: center;
    font-size: 13px;
    margin-bottom: 20px;
    color: #c8e6c9;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

input:focus, select:focus {
    outline: 2px solid gold;
}

button {
    width: 100%;
    padding: 14px;
    background: gold;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

.success {
    background:#004d00;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    display:none;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>PF Pamodzi Alliance</h2>
        <p>Join the MZ8 Movement</p>

        <div id="successBox" class="success">
            Registration successful!
        </div>

        <form method="POST" action="/register">

            <input type="text" name="full_name" placeholder="Full Name" required>

            <select name="province" required>
                <option value="">Select Province</option>
                <option>Lusaka</option>
                <option>Copperbelt</option>
                <option>Central</option>
                <option>Eastern</option>
                <option>Southern</option>
                <option>Western</option>
                <option>North-Western</option>
                <option>Northern</option>
                <option>Luapula</option>
                <option>Muchinga</option>
            </select>

            <input type="text" name="district" placeholder="District" required>
            <input type="text" name="constituency" placeholder="Constituency" required>
            <input type="text" name="ward" placeholder="Ward" required>
            <input type="text" name="phone" placeholder="+260XXXXXXXXX" required>

            <button type="submit">Register Now</button>

        </form>

        <div class="footer">
            Secure Digital Membership System
        </div>

    </div>
</div>

</body>
</html>
