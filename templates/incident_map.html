<!DOCTYPE html>
<html>
<head>
<title>Incident Map (GeoJSON Test)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
}

#map {
    height:100vh;
}

.header {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#063312;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    z-index:999;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🗺️ GeoJSON Boundary Test</div>

<div id="map"></div>

<script>
// =======================
// INIT MAP
// =======================
var map = L.map('map').setView([-13.1339, 27.8493], 6);

// =======================
// BASE MAP
// =======================
L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: "&copy; OpenStreetMap" }
).addTo(map);

// =======================
// LOAD GEOJSON ONLY
// =======================
fetch("/static/geo/zambia_constituencies.geojson")
.then(res => res.json())
.then(geo => {

    console.log("GEOJSON:", geo);

    let geoLayer = L.geoJSON(geo, {
        style: {
            color: "red",
            weight: 2,
            fillColor: "blue",
            fillOpacity: 0.5
        }
    }).addTo(map);

    // 🔥 FORCE VIEW TO BOUNDARIES
    map.fitBounds(geoLayer.getBounds());

})
.catch(err => {
    console.error("GEOJSON LOAD ERROR:", err);
});
</script>

</body>
</html>
