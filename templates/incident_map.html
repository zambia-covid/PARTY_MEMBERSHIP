<!DOCTYPE html>
<html>
<head>
<title>Incident Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; }
#map { height:100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>
// =======================
// INIT MAP (Zambia focus)
// =======================
var map = L.map('map').setView([-13.1339, 27.8493], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// =======================
// LOAD INCIDENTS
// =======================
fetch("/api/incidents")
.then(res => res.json())
.then(data => {

    data.forEach(i => {

        if(!i.lat || !i.lng) return;

        let color = "green";

        if(i.severity === "Critical") color = "red";
        else if(i.severity === "High") color = "orange";
        else if(i.severity === "Medium") color = "yellow";

        let marker = L.circleMarker([i.lat, i.lng], {
            radius: 8,
            color: color
        }).addTo(map);

        marker.bindPopup(`
            <b>${i.type}</b><br>
            ${i.constituency}<br>
            Severity: ${i.severity}<br>
            ${i.description}
        `);
    });

});
</script>

</body>
</html>
