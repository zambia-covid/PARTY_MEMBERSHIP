<!DOCTYPE html>
<html>
<head>
<title>Incident Intelligence Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; }
#map { height:100vh; }

/* HEADER */
.header {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#ffffff;
    color:#333;
    padding:10px 20px;
    border-radius:8px;
    z-index:999;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* 🔙 RETURN BUTTON */
.back-btn {
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:#ffffff;
    color:#333;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    transition:0.2s;
}

.back-btn:hover {
    background:#007bff;
    color:#fff;
}

/* LABELS */
.label {
    color:#000;
    font-size:11px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">Incident Intelligence Map</div>
<a href="/command_dashboard" class="back-btn">🏠 Command Center</a>

<div id="map"></div>

<script>

// =======================
// INIT MAP
// =======================
var map = L.map('map').setView([-13.1339, 27.8493], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18
}).addTo(map);

// =======================
// NORMALIZE
// =======================
function normalize(name){
    return (name || "")
        .toLowerCase()
        .replace(" constituency","")
        .replace(/\s+/g," ")
        .trim();
}

// 🔥 SAFE NAME RESOLVER (CRITICAL)
function getName(props){
    return props.shapeName || props.name || props.NAME || props.constituency || "";
}

// =======================
// LOAD INCIDENTS
// =======================
fetch("/api/incidents")
.then(res => {
    if (!res.ok) throw new Error("Failed to load incidents");
    return res.json();
})
.then(data => {

    let heatPoints = [];
    let scores = {};

    data.forEach(i => {

        if (!i.lat || !i.lng) return;

        // HEAT WEIGHT
        let weight = 0.2;
        if (i.severity === "Critical") weight = 1;
        else if (i.severity === "High") weight = 0.7;
        else if (i.severity === "Medium") weight = 0.4;

        heatPoints.push([i.lat, i.lng, weight]);

        // SCORE
        let key = normalize(i.district);
        let score = i.severity === "Critical" ? 3 :
                    i.severity === "High" ? 2 : 1;

        scores[key] = (scores[key] || 0) + score;

        // MARKER
        L.circleMarker([i.lat, i.lng], {
            radius: 5,
            color: "#007bff",
            fillOpacity: 0.7
        })
        .addTo(map)
        .bindPopup(`
            <b>${i.type || "Incident"}</b><br>
            Severity: ${i.severity}<br>
            ${i.description || ""}
        `);
    });

    // HEATMAP
    L.heatLayer(heatPoints, {
        radius: 25,
        blur: 15
    }).addTo(map);

    // =======================
    // LOAD GEOJSON
    // =======================
    fetch("/static/geo/zambia_constituencies.geojson")
    .then(res => {
        if (!res.ok) throw new Error("GeoJSON failed to load");
        return res.json();
    })
    .then(geo => {

        console.log("GeoJSON loaded:", geo.features.length);

        function getColor(score){
            if (score > 20) return "#dc3545";
            if (score > 10) return "#fd7e14";
            if (score > 5) return "#ffc107";
            return "#28a745";
        }

        let geoLayer = L.geoJSON(geo, {

            style: function(feature){

                let raw = getName(feature.properties);

                if (!raw) {
                    console.warn("Missing name:", feature.properties);
                    return {
                        color:"#999",
                        weight:1,
                        fillColor:"#ccc",
                        fillOpacity:0.3
                    };
                }

                let key = normalize(raw);
                let score = scores[key] || 0;

                return {
                    color:"#555",
                    weight:1,
                    fillColor:getColor(score),
                    fillOpacity:0.5
                };
            },

            onEachFeature: function(feature, layer){

                let raw = getName(feature.properties);
                let key = normalize(raw);
                let score = scores[key] || 0;

                let center = layer.getBounds().getCenter();

                // LABEL
                L.marker(center, {
                    icon: L.divIcon({
                        className:"label",
                        html:`${raw}<br>${score}`
                    })
                }).addTo(map);

                layer.bindPopup(`
                    <b>${raw}</b><br>
                    Incident Score: ${score}
                `);
            }

        }).addTo(map);

        map.fitBounds(geoLayer.getBounds());
    })
    .catch(err => {
        console.error("GeoJSON ERROR:", err);
        alert("Failed to load map boundaries.");
    });

})
.catch(err => {
    console.error("Incident ERROR:", err);
    alert("Failed to load incidents.");
});

</script>

</body>
</html>
