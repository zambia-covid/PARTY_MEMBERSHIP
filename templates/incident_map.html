<!DOCTYPE html>
<html>
<head>
<title>Incident Intelligence Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

.header {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#063312;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    z-index:999;
    font-weight:bold;
}

.legend {
    position:absolute;
    bottom:20px;
    left:20px;
    background:white;
    padding:10px;
    border-radius:8px;
    font-size:12px;
    z-index:999;
}
</style>
</head>

<body>

<div class="header">🛰️ Incident Intelligence Map</div>
<div id="map"></div>

<div class="legend">
    <div><span style="color:green">●</span> Low</div>
    <div><span style="color:yellow">●</span> Medium</div>
    <div><span style="color:orange">●</span> High</div>
    <div><span style="color:red">●</span> Critical</div>
</div>

<script>
// =======================
// INIT MAP
// =======================
var map = L.map('map').setView([-13.1339, 27.8493], 6);

// =======================
// BASE LAYERS
// =======================
var street = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
);

var satellite = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
).addTo(map);

L.control.layers({
    "Street": street,
    "Satellite": satellite
}).addTo(map);

// =======================
// LOAD INCIDENTS
// =======================
fetch("/api/incidents")
.then(res => res.json())
.then(data => {

    console.log("INCIDENT DATA:", data);

    // =======================
    // 🔥 HEATMAP
    // =======================
    let heatPoints = [];

    data.forEach(i => {
        if (!i.lat || !i.lng) return;

        let weight = 0.2;

        if (i.severity === "Critical") weight = 1.0;
        else if (i.severity === "High") weight = 0.7;
        else if (i.severity === "Medium") weight = 0.4;

        heatPoints.push([i.lat, i.lng, weight]);
    });

    L.heatLayer(heatPoints, {
        radius: 25,
        blur: 15,
        maxZoom: 10
    }).addTo(map);

    // =======================
    // 🗺️ LOAD GEOJSON
    // =======================
    fetch("/static/geo/zambia_constituencies.geojson")
    .then(res => res.json())
    .then(geo => {

        // 🔴 CORRECT FIELD
        function getName(feature){
            return feature.properties.shapeName || "Unknown";
        }

        // 🔴 NORMALIZATION (fix matching issues)
        function normalize(name){
            return (name || "")
                .toLowerCase()
                .replace("constituency", "")
                .trim();
        }

        // =======================
        // BUILD SCORES
        // =======================
        let scores = {};

        data.forEach(i => {
            if (!i.constituency) return;

            let key = normalize(i.constituency);

            let score = 1;
            if (i.severity === "Critical") score = 3;
            else if (i.severity === "High") score = 2;

            if (!scores[key]) scores[key] = 0;
            scores[key] += score;
        });

        function getColor(score){
            if (score > 20) return "red";
            if (score > 10) return "orange";
            if (score > 5) return "yellow";
            return "green";
        }

        // =======================
        // DRAW MAP
        // =======================
        let geoLayer = L.geoJSON(geo, {

            style: function(feature){

                let cname = getName(feature);
                let key = normalize(cname);
                let score = scores[key] || 0;

                return {
                    color: "#333",
                    weight: 1,
                    fillColor: getColor(score),
                    fillOpacity: 0.5
                };
            },

            onEachFeature: function(feature, layer){

                let cname = getName(feature);
                let key = normalize(cname);
                let score = scores[key] || 0;

                layer.bindPopup(`
                    <b>${cname}</b><br>
                    Incident Score: ${score}
                `);
            }

        }).addTo(map);

        // 🔥 FORCE VISIBILITY
        map.fitBounds(geoLayer.getBounds());
        geoLayer.bringToFront();

    });

});
</script>

</body>
</html>
