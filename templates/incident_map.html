<!DOCTYPE html>
<html>
<head>
<title>Election War Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header {
    background:#1e2a38;
    color:white;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

/* STATS BAR */
.stats {
    display:flex;
    justify-content:space-around;
    background:#f4f6f8;
    padding:8px;
    font-weight:bold;
}

/* LAYOUT */
.container {
    display:flex;
    flex:1;
}

/* MAP */
#map {
    flex:3;
}

/* PANEL */
.panel {
    flex:1;
    background:#ffffff;
    padding:10px;
    overflow-y:auto;
    border-left:1px solid #ddd;
}

.panel h3 {
    margin-top:0;
}

/* RESULT ITEM */
.item {
    padding:8px;
    margin-bottom:6px;
    border-left:4px solid #ccc;
    cursor:pointer;
    font-size:13px;
}

.win { border-color: green; }
.lose { border-color: red; }
.toss { border-color: orange; }

/* LABELS */
.label {
    font-size:11px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">Election War Room</div>

<div class="stats">
    <div>🟢 WIN: <span id="win">0</span></div>
    <div>🔴 LOSE: <span id="lose">0</span></div>
    <div>🟡 TOSS-UP: <span id="toss">0</span></div>
</div>

<div class="container">
    <div id="map"></div>

    <div class="panel">
        <h3>Live Results</h3>
        <div id="results"></div>
    </div>
</div>

<script>

// =======================
// INIT MAP
// =======================
var map = L.map('map').setView([-13.1339, 27.8493], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// =======================
// NORMALIZE
// =======================
function normalize(name){
    return (name || "").toLowerCase().trim();
}

let geoLayer;

// =======================
// LOAD DATA
// =======================
function loadData(){

    fetch("/api/live_dashboard")
    .then(res => res.json())
    .then(data => {

        let resultsMap = {};
        let win = 0, lose = 0, toss = 0;

        let panel = document.getElementById("results");
        panel.innerHTML = "";

        data.forEach(r => {

            resultsMap[normalize(r.constituency)] = r;

            if (r.status === "WIN") win++;
            else if (r.status === "LOSE") lose++;
            else toss++;

            // PANEL ITEM
            let div = document.createElement("div");
            div.className = "item " + r.status.toLowerCase();

            div.innerHTML = `
                <b>${r.constituency}</b><br>
                PF: ${r.pf} | UPND: ${r.upnd}<br>
                ${r.status}
            `;

            // CLICK → FOCUS MAP
            div.onclick = () => {
                focusConstituency(r.constituency);
            };

            panel.appendChild(div);
        });

        document.getElementById("win").innerText = win;
        document.getElementById("lose").innerText = lose;
        document.getElementById("toss").innerText = toss;

        // =======================
        // GEOJSON LOAD / UPDATE
        // =======================
        fetch("/static/geo/zambia_constituencies.geojson")
        .then(res => res.json())
        .then(geo => {

            if (geoLayer) map.removeLayer(geoLayer);

            function getColor(status){
                if (status === "WIN") return "#28a745";
                if (status === "LOSE") return "#dc3545";
                return "#ffc107";
            }

            geoLayer = L.geoJSON(geo, {

                style: function(feature){
                    let key = normalize(feature.properties.shapeName);
                    let r = resultsMap[key];

                    return {
                        color:"#555",
                        weight:1,
                        fillColor:getColor(r ? r.status : "TOSS-UP"),
                        fillOpacity:0.6
                    };
                },

                onEachFeature: function(feature, layer){

                    let key = normalize(feature.properties.shapeName);
                    let r = resultsMap[key];

                    let status = r ? r.status : "TOSS-UP";

                    let center = layer.getBounds().getCenter();

                    L.marker(center, {
                        icon: L.divIcon({
                            className:"label",
                            html:`${feature.properties.shapeName}<br>${status}`
                        })
                    }).addTo(map);

                    layer.bindPopup(`
                        <b>${feature.properties.shapeName}</b><br>
                        Status: ${status}<br>
                        PF: ${r ? r.pf : 0}<br>
                        UPND: ${r ? r.upnd : 0}<br>
                        Margin: ${r ? r.margin : 0}
                    `);
                }

            }).addTo(map);

            map.fitBounds(geoLayer.getBounds());
        });

    });
}

// =======================
// FOCUS FUNCTION
// =======================
function focusConstituency(name){

    geoLayer.eachLayer(layer => {
        let cname = normalize(layer.feature.properties.shapeName);

        if (cname === normalize(name)) {
            map.fitBounds(layer.getBounds());
            layer.openPopup();
        }
    });
}

// =======================
// AUTO REFRESH
// =======================
loadData();
setInterval(loadData, 10000); // every 10 seconds

</script>

</body>
</html>
