<!DOCTYPE html>
<html>
<head>
<title>Members</title>

<style>
body{
    font-family:Arial;
    background:#0b1f0b;
    color:white;
    margin:0;
}

.header{
    padding:15px;
    background:#0b6623;
}

.container{
    padding:20px;
}

input{
    padding:10px;
    width:250px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:gold;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td, th{
    padding:10px;
    border-bottom:1px solid #333;
    text-align:left;
}

a{
    color:gold;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    Members Directory
</div>

<div class="container">

<form method="GET">
    <input type="text" name="q" placeholder="Search name or phone">
    <button type="submit">Search</button>
</form>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Province</th>
    <th>Constituency</th>
    <th>Status</th>
    <th>Card</th> <!-- ✅ ADDED -->
</tr>
</thead>

<tbody>
{% for m in members %}
<tr>
    <td>{{ m[0] }}</td>
    <td>{{ m[1] }}</td>
    <td>{{ m[2] }}</td>
    <td>{{ m[3] }}</td>
    <td>{{ m[4] }}</td>
    <td>{{ m[5] }}</td>

    <!-- ✅ CARD DOWNLOAD -->
    <td>
        <a href="/download_card/{{ m[0] }}" target="_blank">
            Download
        </a>
    </td>

</tr>
{% endfor %}
</tbody>

</table>

</div>

</body>
</html>
