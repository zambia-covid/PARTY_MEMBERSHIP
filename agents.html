<!DOCTYPE html>
<html>
<head>

<title>Agent Enrollment</title>

<style>

body{
font-family:Arial;
background:#eef5ee;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#0b6623;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#084d1a;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.back-btn{
background:#555;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0b6623;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.active{
color:green;
font-weight:bold;
}

.inactive{
color:red;
font-weight:bold;
}

.toggle-btn{
background:#b91c1c;
}

.toggle-btn.active-btn{
background:#16a34a;
}

</style>

</head>

<body>

<div class="top-bar">
<h2>Polling Agent Enrollment</h2>
<a href="/"><button class="back-btn">⬅ Back to Dashboard</button></a>
</div>

<!-- FORM -->

<div class="card">

<form method="POST">

<input type="text" name="name" placeholder="Agent Name" required>

<input type="text" name="phone" placeholder="Phone (+260...)" required>

<input type="text" name="province" placeholder="Province" required>

<input type="text" name="constituency" placeholder="Constituency" required>

<input type="text" name="polling_station" placeholder="Polling Station" required>

<button type="submit">Register Agent</button>

</form>

</div>

<!-- AGENTS TABLE -->

<div class="card">

<h3>Registered Agents</h3>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Province</th>
<th>Constituency</th>
<th>Polling Station</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for a in agents %}

<tr>
<td>{{ a[0] }}</td>
<td>{{ a[1] }}</td>
<td>{{ a[2] }}</td>
<td>{{ a[3] }}</td>
<td>{{ a[4] }}</td>
<td>{{ a[5] }}</td>

<td>
{% if a[6] %}
<span class="active">Active</span>
{% else %}
<span class="inactive">Disabled</span>
{% endif %}
</td>

<td>
<a href="/toggle_agent/{{ a[0] }}">
<button class="toggle-btn {% if not a[6] %}active-btn{% endif %}">
{% if a[6] %}Disable{% else %}Enable{% endif %}
</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
