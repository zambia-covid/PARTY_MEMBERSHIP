<!DOCTYPE html>
<html>
<head>
<title>Voter Tabulation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3>Polling Station Results (Gen 12)</h3>

<div class="card p-3 mb-4">

<form action="/add_results" method="POST" class="row g-2">

<input name="province" placeholder="Province" class="form-control" required>
<input name="district" placeholder="District" class="form-control" required>
<input name="constituency" placeholder="Constituency" class="form-control" required>
<input name="ward" placeholder="Ward" class="form-control" required>
<input name="polling_station" placeholder="Polling Station" class="form-control" required>

<input name="registered_voters" type="number" placeholder="Registered Voters" class="form-control" required>
<input name="votes_cast" type="number" placeholder="Votes Cast" class="form-control" required>

<input name="pf_votes" type="number" placeholder="PF Votes" class="form-control" required>
<input name="upnd_votes" type="number" placeholder="UPND Votes" class="form-control" required>
<input name="other_votes" type="number" placeholder="Other Votes" class="form-control" required>
<input name="rejected_votes" type="number" placeholder="Rejected Votes" class="form-control" required>

<input name="captured_by" placeholder="Agent Name" class="form-control" required>

<button class="btn btn-success mt-2">Submit Results</button>

</form>

</div>

<table class="table table-bordered">

<thead class="table-success">
<tr>
<th>Province</th>
<th>District</th>
<th>Constituency</th>
<th>Ward</th>
<th>Station</th>
<th>Registered</th>
<th>Cast</th>
<th>PF</th>
<th>UPND</th>
<th>Other</th>
<th>Rejected</th>
</tr>
</thead>

<tbody>

{% for r in data %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
<td>{{ r[6] }}</td>
<td class="text-success">{{ r[7] }}</td>
<td class="text-danger">{{ r[8] }}</td>
<td>{{ r[9] }}</td>
<td>{{ r[10] }}</td>
</tr>
{% endfor %}

</tbody>

</table>

<a href="/" class="btn btn-secondary mt-3">Back to Dashboard</a>

</body>
</html>
